<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Đối Tác — Đồng Phục HV</title>
    <meta name="description" content="Dashboard đối tác Đồng Phục HV - Báo cáo hoa hồng & rút tiền">
    <!-- Open Graph — hiện ảnh khi gửi link qua Zalo/Facebook/Messenger -->
    <meta property="og:title" content="Cổng Đối Tác — Đồng Phục HV">
    <meta property="og:description" content="Hệ thống quản lý hoa hồng Affiliate - Đồng Phục HV">
    <meta property="og:image" content="https://dongphuchv.net/images/og-doitac.png">
    <meta property="og:url" content="https://dongphuchv.net/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Đồng Phục HV">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=20260429c">
    <link rel="stylesheet" href="/css/style-mobile.css?v=20260429c" media="(max-width: 768px)">
    <link rel="icon" href="/images/logo.png" type="image/png">
    <!-- ★ INLINE mobile sidebar — guaranteed to work, no cache issues -->
    <style>
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%) !important; pointer-events: none !important; }
            .sidebar.open { transform: translateX(0) !important; pointer-events: auto !important; z-index: 9999 !important; box-shadow: 4px 0 30px rgba(0,0,0,0.4) !important; }
            .sidebar-overlay { position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; background: rgba(0,0,0,0.5) !important; z-index: 9998 !important; display: none !important; }
            .sidebar-overlay.show { display: block !important; }
            .menu-toggle { display: inline-block !important; min-width: 44px !important; min-height: 44px !important; font-size: 24px !important; z-index: 60 !important; cursor: pointer !important; }
        }
    </style>
</head>
<body class="dashboard">
    <!-- ★ INLINE toggle — uses inline styles + smart mobile detection -->
    <script>
    var _sidebarOpen = false;
    function toggleSidebar(forceMode) {
        var sidebar = document.getElementById('sidebar');
        var overlay = document.getElementById('sidebarOverlay');
        var menuBtn = document.getElementById('menuToggle');

        // Smart mobile detection: button visible = mobile
        // (menuToggle is display:none on desktop, inline-block on mobile via CSS)
        var isMobile = forceMode === 'mobile' 
            || window.innerWidth <= 768
            || (menuBtn && menuBtn.offsetWidth > 0);

        if (isMobile) {
            _sidebarOpen = !_sidebarOpen;
            if (_sidebarOpen) {
                sidebar.style.cssText = 'transform:translateX(0) !important;pointer-events:auto !important;z-index:99999 !important;box-shadow:4px 0 30px rgba(0,0,0,0.4) !important;width:270px !important;position:fixed !important;top:0 !important;left:0 !important;bottom:0 !important;';
                if (overlay) overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99998;display:block !important;';
            } else {
                sidebar.style.cssText = '';
                if (overlay) overlay.style.cssText = '';
            }
        } else {
            sidebar.classList.toggle('collapsed');
            var btn = document.getElementById('sidebarToggleBtn');
            if (btn) btn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
        }
    }
    </script>
    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container">
        <!-- Mobile overlay (must be inside app-container, same stacking context as sidebar) -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="_sidebarOpen=false;document.getElementById('sidebar').style.cssText='';this.style.cssText='';"></div>
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/images/logo.png" alt="Logo">
                <div class="brand">
                    <h2>ĐỒNG PHỤC HV</h2>
                    <p>Cổng Đối Tác</p>
                </div>
                <button class="sidebar-toggle-btn" id="sidebarToggleBtn" onclick="toggleSidebar()" title="Đóng/Mở menu">◀</button>
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Dynamic menu items rendered by JS -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="name" id="userName">Đối Tác</div>
                        <span class="role-badge" id="userRole">Affiliate</span>
                    </div>
                    <button class="btn-logout" id="logoutBtn" title="Đăng xuất">⏻</button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar('mobile')">☰</button>
                    <h1 class="page-title" id="pageTitle">Dashboard</h1>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-sm btn-secondary" id="changePasswordBtn">🔒 Đổi mật khẩu</button>
                </div>
            </div>

            <div class="content-area" id="contentArea">
                <!-- Dynamic content rendered by JS -->
            </div>
        </main>
    </div>

    <!-- Modal container -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContainer">
            <div class="modal-header">
                <h3 id="modalTitle">Modal</h3>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- Core app JS (shared) -->
    <script src="/js/app.js?v=20260430b"></script>
    <script src="/js/sidebar-utils.js?v=20260429b"></script>
    <!-- Affiliate-only pages -->
    <script src="/js/pages/baocaohoahong.js?v=20260430d"></script>
    <script src="/js/pages/baocaohoahonghv.js?v=20260430a"></script>
    <script src="/js/pages/rut-tien-affiliate.js?v=20260430a"></script>
    <script src="/js/pages/chuyenso.js?v=20260430a"></script>
    <script src="/js/pages/quanly-hethong-aff.js?v=20260430a"></script>
</body>
</html>
