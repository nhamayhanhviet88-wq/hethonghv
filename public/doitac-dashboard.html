    <!-- ★ INLINE mobile sidebar — guaranteed to work, no cache issues -->
    <style>
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%) !important; pointer-events: none !important; }
            .sidebar.open { transform: translateX(0) !important; pointer-events: auto !important; z-index: 9999 !important; box-shadow: 4px 0 30px rgba(0,0,0,0.4) !important; }
            .sidebar-overlay { position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; background: rgba(0,0,0,0.5) !important; z-index: 9998 !important; display: none !important; }
            .sidebar-overlay.show { display: block !important; }
            .menu-toggle { display: inline-block !important; min-width: 44px !important; min-height: 44px !important; font-size: 24px !important; z-index: 60 !important; cursor: pointer !important; }
            .main-content { margin-left: 0 !important; width: 100% !important; }
            .content-area { padding: 12px !important; overflow-x: hidden !important; }
            .hdsd-page, .hdsd-page * { max-width: 100% !important; box-sizing: border-box !important; }
            .hdsd-page { overflow-x: hidden !important; }
            .hdsd-hero-content { max-width: 100% !important; width: 100% !important; padding: 0 !important; }
            /* ★ Ẩn mô tả hero trên mobile */
            .hdsd-hero-desc { display: none !important; }
            /* ★ Badge dịch lên, title + subtitle dịch xuống */
            .hdsd-hero-badge { margin-top: 0 !important; }
            .hdsd-hero-title { margin-top: 20px !important; }
            .hdsd-hero-subtitle { margin-top: 24px !important; }
            /* ★ Thu gọn ví dụ hoa hồng */
            .hdsd-comm-example { padding: 16px !important; }
            .hdsd-comm-example h3 { font-size: 16px !important; }
            .hdsd-example-row { flex-direction: column !important; gap: 4px !important; padding: 10px !important; }
            .hdsd-example-val { font-size: 16px !important; text-align: left !important; }
            .hdsd-example-total { font-size: 18px !important; }
            .content-area .hdsd-table { display: table !important; overflow: hidden !important; min-width: auto !important; width: 100% !important; }
            .content-area .hdsd-table thead { display: none !important; }
            .content-area .hdsd-table tbody, .content-area .hdsd-table tr { display: table-row !important; width: auto !important; white-space: normal !important; }
            .content-area .hdsd-table td:last-child { display: none !important; }
            /* ★ Ẩn ảnh screenshots trong 5 bước — giảm 50% chiều dài */
            .hdsd-step-content img { display: none !important; }
            /* ★ Ẩn role cards — giữ lời chào + cam kết */
            .hdsd-role-grid { display: none !important; }
            /* ★ Feature badges 2x2 gọn gàng */
            .hdsd-hero-content > div[style*="display:flex"][style*="flex-wrap:wrap"] {
                display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 8px 12px !important;
            }
            /* ★ (1) Stats grid 2x2 */
            .hdsd-stats-grid { grid-template-columns: 1fr 1fr !important; gap: 12px !important; }
            /* ★ (2) Ẩn welcome text dài */
            .hdsd-welcome-text { display: none !important; }
            /* ★ (3) Ẩn subcards step 3 (Thông báo, Truy cập, Biểu đồ) */
            .hdsd-step-card .hdsd-subcards[style*="repeat(3,1fr)"] { display: none !important; }
            /* ★ (4) Ẩn FAQ subcards step 4 (Rút tối thiểu, Nhận tiền) */
            .hdsd-step-card .hdsd-subcards[style*="repeat(2,1fr)"] { display: none !important; }
            /* ★ (5) Ẩn mô tả dài step 5 (trạng thái đơn hàng) */
            .hdsd-step-card > .hdsd-step-content > p[style*="font-size:14px"][style*="color:var(--hdsd-slate-600)"] { display: none !important; }
        }

<body class="dashboard">
    <!-- ★ INLINE toggle — uses inline styles + smart mobile detection -->
    <script>
    var _sidebarOpen = false;
    function toggleSidebar(forceMode) {
        var sidebar = document.getElementById('sidebar');
        var overlay = document.getElementById('sidebarOverlay');
        var menuBtn = document.getElementById('menuToggle');

        // Smart mobile detection: button visible = mobile
        // (menuToggle is display:none on desktop, inline-block on mobile via CSS)
        var isMobile = forceMode === 'mobile' 
            || window.innerWidth <= 768
            || (menuBtn && menuBtn.offsetWidth > 0);

        if (isMobile) {
            _sidebarOpen = !_sidebarOpen;
            if (_sidebarOpen) {
                sidebar.style.cssText = 'transform:translateX(0) !important;pointer-events:auto !important;z-index:99999 !important;box-shadow:4px 0 30px rgba(0,0,0,0.4) !important;width:270px !important;position:fixed !important;top:0 !important;left:0 !important;bottom:0 !important;';
                if (overlay) overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99998;display:block !important;';
            } else {
                sidebar.style.cssText = '';
                if (overlay) overlay.style.cssText = '';
            }
        } else {
            sidebar.classList.toggle('collapsed');
            var btn = document.getElementById('sidebarToggleBtn');
            if (btn) btn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
        }
    }
    </script>
    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container">
        <!-- Mobile overlay (must be inside app-container, same stacking context as sidebar) -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="_sidebarOpen=false;document.getElementById('sidebar').style.cssText='';this.style.cssText='';"></div>
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/images/logo.png" alt="Logo">
                <div class="brand">
                    <h2>ĐỒNG PHỤC HV</h2>
                    <p>Cổng Đối Tác</p>
                </div>
                <button class="sidebar-toggle-btn" id="sidebarToggleBtn" onclick="toggleSidebar()" title="Đóng/Mở menu">◀</button>
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Dynamic menu items rendered by JS -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="name" id="userName">Đối Tác</div>
                        <span class="role-badge" id="userRole">Affiliate</span>
                    </div>
                    <button class="btn-logout" id="logoutBtn" title="Đăng xuất">⏻</button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar('mobile')">☰</button>
                    <h1 class="page-title" id="pageTitle">Dashboard</h1>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-sm btn-secondary" id="changePasswordBtn">🔒 Đổi mật khẩu</button>
                </div>
            </div>

            <div class="content-area" id="contentArea">
                <!-- Dynamic content rendered by JS -->
            </div>
        </main>
    </div>

    <!-- Modal container -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContainer">
            <div class="modal-header">
                <h3 id="modalTitle">Modal</h3>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- Core app JS (shared) -->

    <script src="/js/pages/chuyenso.js?v=20260430a"></script>
    <script src="/js/pages/quanly-hethong-aff.js?v=20260430a"></script>
    <script src="/js/pages/huongdansudung.js?v=20260501a"></script>
</body>
