<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👥 Tài Khoản — Đồng Phục HV</title>
    <meta name="description" content="Quản lý tài khoản nhân viên trên điện thoại">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="/images/logo.png" type="image/png">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',-apple-system,sans-serif;background:#f1f5f9;min-height:100vh;color:#1e293b}
        .mh{background:linear-gradient(135deg,#122546,#1e3a5f);padding:14px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
        .mh img{width:32px;height:32px;border-radius:8px}
        .mh h1{font-size:15px;font-weight:800;color:#fbbf24;flex:1}
        .mh .mu{font-size:10px;color:#93c5fd;font-weight:600;background:rgba(255,255,255,.1);padding:4px 8px;border-radius:6px}
        .mt-c{position:fixed;top:60px;left:8px;right:8px;z-index:999}
        .mt{padding:12px 16px;border-radius:10px;color:#fff;font-size:14px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:mSI .3s ease;margin-bottom:6px}
        .mt-s{background:linear-gradient(135deg,#10b981,#059669)}.mt-e{background:linear-gradient(135deg,#ef4444,#dc2626)}.mt-i{background:linear-gradient(135deg,#3b82f6,#2563eb)}
        @keyframes mSI{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
        .mc{padding:12px;max-width:600px;margin:0 auto}
        .ms{display:flex;gap:8px;margin-bottom:10px;position:sticky;top:60px;z-index:50;background:#f1f5f9;padding:6px 0}
        .ms input{flex:1;padding:12px 14px;border:2px solid #e2e8f0;border-radius:12px;font-size:16px;font-family:'Inter',sans-serif;background:#fff;color:#1e293b;outline:none;-webkit-appearance:none}
        .ms input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
        .mf{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
        .mf button{padding:8px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:11px;font-weight:700;background:#fff;color:#64748b;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif}
        .mf button.act{background:linear-gradient(135deg,#122546,#1e3a5f);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(18,37,70,.3)}
        .mst{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
        .mst>div{border-radius:10px;padding:10px 6px;text-align:center;border:1.5px solid transparent}
        .mst .sv{font-size:20px;font-weight:900}.mst .sl{font-size:9px;font-weight:700;margin-top:2px}
        .uc{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1.5px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .15s}
        .uc:active{transform:scale(.98)}
        .uc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
        .uc-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;flex-shrink:0}
        .uc-name{font-size:15px;font-weight:800;color:#0f172a}.uc-user{font-size:11px;color:#94a3b8}
        .uc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
        .tg{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600}
        .uc-info{font-size:11px;color:#64748b;margin-top:6px;display:flex;flex-wrap:wrap;gap:8px}
        .me{text-align:center;padding:50px 20px;color:#94a3b8}
        .ml{text-align:center;padding:50px 20px}.msp{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:sp .6s linear infinite;display:inline-block;margin-bottom:8px}
        @keyframes sp{to{transform:rotate(360deg)}}
        .mb{display:inline-flex;align-items:center;gap:6px;color:#3b82f6;font-size:13px;font-weight:600;text-decoration:none;margin-top:10px;padding:10px 16px;background:#fff;border-radius:10px;border:1px solid #e2e8f0}
        .ud-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
        .ud-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:20px;animation:sheetUp .3s ease}
        @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .ud-close{float:right;background:#f1f5f9;border:none;width:32px;height:32px;border-radius:10px;font-size:18px;cursor:pointer;color:#64748b}
        .ud-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
        .ud-label{color:#94a3b8;font-weight:600}.ud-val{color:#1e293b;font-weight:700;text-align:right}
    </style>
</head>
<body>
    <div class="mh"><img src="/images/logo.png" alt="Logo"><h1>👥 TÀI KHOẢN</h1><span class="mu" id="mU">...</span></div>
    <div class="mt-c" id="mTC"></div>
    <div class="mc">
        <div class="ms"><input type="search" id="mQ" placeholder="🔍 Tìm tên, SĐT..." inputmode="search" enterkeyhint="search"></div>
        <div class="mf" id="mF"></div>
        <div class="mst" id="mSt"></div>
        <div id="mR"><div class="ml"><div class="msp"></div><div style="color:#64748b;font-weight:600">Đang tải...</div></div></div>
        <a href="/accounts" class="mb">← Về trang Desktop</a>
    </div>
    <script>
    let currentUser=null,_allUsers=[],_filter='',_roleFilter='';
    const RL={giam_doc:'Giám Đốc',quan_ly_cap_cao:'QLCC',quan_ly:'Quản Lý',truong_phong:'Trưởng Phòng',nhan_vien:'Nhân Viên',thu_viec:'Thử Việc',part_time:'Part Time'};
    const RC={giam_doc:['#fef3c7','#92400e'],quan_ly_cap_cao:['#fff7ed','#c2410c'],quan_ly:['#dbeafe','#1e40af'],truong_phong:['#d1fae5','#065f46'],nhan_vien:['#e0f2fe','#0c4a6e'],thu_viec:['#f3e8ff','#7c3aed'],part_time:['#f0fdf4','#15803d']};
    const AG={giam_doc:'#d4a843',quan_ly_cap_cao:'#c2410c',quan_ly:'#2563eb',truong_phong:'#16a34a',nhan_vien:'#0284c7',thu_viec:'#7c3aed',part_time:'#15803d'};

    async function api(u){const r=await fetch(u,{credentials:'include'});if(r.status===401){location.href='/index.html';return}return r.json()}
    function toast(m,t='s'){const c=document.getElementById('mTC'),d=document.createElement('div');d.className='mt mt-'+t;d.textContent=m;c.appendChild(d);setTimeout(()=>d.remove(),3000)}

    function fmtDate(d){if(!d)return'—';const p=(d||'').slice(0,10).split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d}
    function calcDays(u){if(!u.start_date)return'—';const s=new Date(u.start_date.split('T')[0]+'T00:00:00'),e=u.status==='active'?new Date():new Date((u.updated_at||u.start_date).split('T')[0]+'T00:00:00');const d=Math.max(0,Math.round((e-s)/864e5));return d>=365?Math.floor(d/365)+'n '+Math.floor((d%365)/30)+'th':d+' ngày'}

    (async()=>{
        try{
            const a=await api('/api/auth/me');
            if(!a.user){location.href='/index.html';return}
            currentUser=a.user;
            document.getElementById('mU').textContent=currentUser.full_name||currentUser.username;
            await loadAll();
        }catch(e){document.getElementById('mR').innerHTML='<div class="me">❌ Lỗi kết nối</div>'}
    })();

    document.getElementById('mQ').addEventListener('input',()=>render());
    document.getElementById('mQ').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('mQ').blur()}});

    async function loadAll(){
        const d=await api('/api/users');
        _allUsers=(d.users||[]).filter(u=>u.role!=='tkaffiliate');
        const RO=['giam_doc','quan_ly_cap_cao','quan_ly','truong_phong','nhan_vien','thu_viec','part_time'];
        _allUsers.sort((a,b)=>{const ai=RO.indexOf(a.role),bi=RO.indexOf(b.role);if(ai!==bi)return(ai===-1?99:ai)-(bi===-1?99:bi);const da=a.start_date?new Date()-new Date(a.start_date):-1,db=b.start_date?new Date()-new Date(b.start_date):-1;return db-da});
        buildFilters();render();
    }

    function buildFilters(){
        const roles=[...new Set(_allUsers.map(u=>u.role))];
        let h='<button class="act" onclick="_setRole(\'\',this)">Tất cả</button>';
        roles.forEach(r=>{h+=`<button onclick="_setRole('${r}',this)">${RL[r]||r}</button>`});
        document.getElementById('mF').innerHTML=h;
    }

    function _setRole(r,el){
        _roleFilter=r;
        document.querySelectorAll('.mf button').forEach(b=>b.classList.remove('act'));
        el.classList.add('act');render();
    }

    function render(){
        const q=(document.getElementById('mQ').value||'').toLowerCase().trim();
        let users=_allUsers.slice();
        if(_roleFilter)users=users.filter(u=>u.role===_roleFilter);
        if(q)users=users.filter(u=>(u.full_name||'').toLowerCase().includes(q)||(u.phone||'').includes(q)||(u.username||'').toLowerCase().includes(q));

        const active=users.filter(u=>u.status==='active'),resigned=users.filter(u=>u.status!=='active'&&u.status!=='probation_locked'),probLocked=users.filter(u=>u.status==='probation_locked');

        // Stats
        document.getElementById('mSt').innerHTML=`
            <div style="background:#ecfdf5;border-color:#86efac"><div class="sv" style="color:#166534">${active.length}</div><div class="sl" style="color:#15803d">Đang làm</div></div>
            <div style="background:#faf5ff;border-color:#c4b5fd"><div class="sv" style="color:#7c3aed">${probLocked.length}</div><div class="sl" style="color:#6d28d9">Hết hạn TV</div></div>
            <div style="background:#fef2f2;border-color:#fca5a5"><div class="sv" style="color:#dc2626">${resigned.length}</div><div class="sl" style="color:#991b1b">Nghỉ việc</div></div>`;

        if(users.length===0){document.getElementById('mR').innerHTML='<div class="me"><div style="font-size:48px;opacity:.4">👥</div><div style="font-size:15px;font-weight:600">Không tìm thấy</div></div>';return}

        let h='';
        const renderSection=(title,icon,list,borderColor)=>{
            if(list.length===0)return;
            h+=`<div style="font-size:13px;font-weight:800;color:${borderColor};margin:12px 0 6px;display:flex;align-items:center;gap:6px">${icon} ${title} <span style="font-weight:400;color:#94a3b8;font-size:11px">(${list.length})</span></div>`;
            list.forEach(u=>{
                const rc=RC[u.role]||['#e5e7eb','#374151'];
                const ac=AG[u.role]||'#64748b';
                const bday=u.birth_date?(()=>{const bd=new Date(u.birth_date),t=new Date();return bd.getDate()===t.getDate()&&bd.getMonth()===t.getMonth()?'🎂':'';})():'';
                h+=`<div class="uc" onclick="_showDetail(${u.id})">
                    <div class="uc-top">
                        <div class="uc-av" style="background:${ac}">${(u.full_name||'?').charAt(0).toUpperCase()}</div>
                        <div style="flex:1;min-width:0">
                            <div class="uc-name">${bday} ${u.full_name||'—'}</div>
                            <div class="uc-user">@${u.username}</div>
                        </div>
                    </div>
                    <div class="uc-tags">
                        <span class="tg" style="background:${rc[0]};color:${rc[1]}">${RL[u.role]||u.role}</span>
                        ${u.position_name?'<span class="tg" style="background:#f8fafc;color:#475569">'+u.position_name+'</span>':''}
                        ${u.status==='active'?'<span class="tg" style="background:#dcfce7;color:#166534">✅ Đang làm</span>':u.status==='probation_locked'?'<span class="tg" style="background:#f3e8ff;color:#7c3aed">⏰ Hết hạn TV</span>':'<span class="tg" style="background:#fecaca;color:#991b1b">🚫 Nghỉ</span>'}
                        ${u.telegram_group_id?'<span class="tg" style="background:#e0f2fe;color:#0c4a6e">📱 TG</span>':''}
                    </div>
                    <div class="uc-info">
                        ${u.phone?'<span>📞 '+u.phone+'</span>':''}
                        <span>📅 ${fmtDate(u.start_date)}</span>
                        <span>⏱ ${calcDays(u)}</span>
                    </div>
                </div>`;
            });
        };
        renderSection('Đang Làm','✅',active,'#166534');
        renderSection('Hết Hạn Thử Việc','⏰',probLocked,'#7c3aed');
        renderSection('Nghỉ Việc','🚫',resigned,'#991b1b');
        document.getElementById('mR').innerHTML=h;
    }

    async function _showDetail(id){
        const d=await api('/api/users/'+id);
        const u=d.user;if(!u)return;
        const rc=RC[u.role]||['#e5e7eb','#374151'];
        const ac=AG[u.role]||'#64748b';
        const bday=u.birth_date?fmtDate(u.birth_date):'—';
        const ol=document.createElement('div');ol.className='ud-overlay';
        ol.onclick=e=>{if(e.target===ol)ol.remove()};
        ol.innerHTML=`<div class="ud-sheet">
            <button class="ud-close" onclick="this.closest('.ud-overlay').remove()">✕</button>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
                <div class="uc-av" style="background:${ac};width:50px;height:50px;font-size:20px">${(u.full_name||'?').charAt(0).toUpperCase()}</div>
                <div><div style="font-size:18px;font-weight:900;color:#0f172a">${u.full_name}</div><div style="font-size:12px;color:#94a3b8">@${u.username}</div>
                <span class="tg" style="background:${rc[0]};color:${rc[1]};font-size:11px">${RL[u.role]||u.role}</span></div>
            </div>
            <div class="ud-row"><span class="ud-label">📞 SĐT</span><span class="ud-val">${u.phone||'—'}</span></div>
            <div class="ud-row"><span class="ud-label">🎂 Sinh nhật</span><span class="ud-val">${bday}</span></div>
            <div class="ud-row"><span class="ud-label">📅 Ngày vào</span><span class="ud-val">${fmtDate(u.start_date)}</span></div>
            <div class="ud-row"><span class="ud-label">⏱ Thời gian làm</span><span class="ud-val">${calcDays(u)}</span></div>
            <div class="ud-row"><span class="ud-label">🏢 Phòng ban</span><span class="ud-val">${u.department_name||'—'}</span></div>
            <div class="ud-row"><span class="ud-label">💼 Vị trí</span><span class="ud-val">${u.position_name||'—'}</span></div>
            <div class="ud-row"><span class="ud-label">📍 Địa chỉ</span><span class="ud-val" style="max-width:55%;word-break:break-word">${u.address||'—'}${u.province?', '+u.province:''}</span></div>
            <div class="ud-row"><span class="ud-label">📱 Telegram</span><span class="ud-val">${u.telegram_group_id?'✅ Đã kết nối':'❌ Chưa có'}</span></div>
            <div class="ud-row"><span class="ud-label">🔑 Trạng thái</span><span class="ud-val">${u.status==='active'?'✅ Đang làm':u.status==='probation_locked'?'⏰ Hết hạn TV':'🚫 Nghỉ việc'}</span></div>
            ${u.role==='thu_viec'&&u.probation_end_date?'<div class="ud-row"><span class="ud-label">🧪 Hết hạn TV</span><span class="ud-val">'+fmtDate(u.probation_end_date)+'</span></div>':''}
        </div>`;
        document.body.appendChild(ol);
    }
    </script>
</body>
</html>
