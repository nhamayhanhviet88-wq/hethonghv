<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scale=no">
    <title>✂️ Bộ Phận Cắt — Đồng Phục HV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="/images/logo.png" type="image/png">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;color:#e2e8f0;padding-bottom:70px}
        .m-header{background:linear-gradient(135deg,#7f1d1d,#991b1b);padding:14px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.3);position:sticky;top:0;z-index:100}
        .m-header img{width:32px;height:32px;border-radius:8px}
        .m-header h1{font-size:15px;font-weight:800;color:#fca5a5;flex:1}
        .m-user{font-size:10px;color:#fecaca;font-weight:600;background:rgba(255,255,255,0.1);padding:4px 8px;border-radius:6px}
        .m-tabs{display:flex;background:#1a2332;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:60px;z-index:99}
        .m-tab{flex:1;padding:12px 8px;text-align:center;font-size:11px;font-weight:700;color:#94a3b8;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
        .m-tab.active{color:#fca5a5;border-bottom-color:#ef4444;background:rgba(239,68,68,0.08)}
        .m-tab .m-tab-badge{display:inline-block;background:#ef4444;color:#fff;padding:1px 7px;border-radius:10px;font-size:9px;font-weight:800;margin-left:4px;min-width:18px}
        .m-content{padding:12px;background:#0f172a;min-height:calc(100vh - 120px)}
        .m-card{background:#1e293b;border:1px solid rgba(255,255,255,0.08);border-radius:16px;margin-bottom:12px;overflow:hidden}
        .m-card-top{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.06)}
        .m-card-icon{font-size:28px}
        .m-card-title{font-size:14px;font-weight:800;color:#fca5a5;flex:1}
        .m-card-code{font-size:10px;color:#94a3b8;font-weight:600}
        .m-card-body{padding:12px 16px}
        .m-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
        .m-lbl{font-size:11px;color:#94a3b8;font-weight:600}
        .m-val{font-size:13px;color:#e2e8f0;font-weight:700}
        .m-divider{border-top:1px solid rgba(255,255,255,0.06);margin:8px 0}
        .m-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;margin:2px}
        .m-badge-ok{background:#dcfce7;color:#059669}
        .m-badge-no{background:#fee2e2;color:#dc2626}
        .m-btn-claim{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;margin-top:10px;letter-spacing:0.5px;transition:all .2s;font-family:'Inter',sans-serif}
        .m-btn-claim.ready{background:linear-gradient(135deg,#059669,#10b981);color:#fff;box-shadow:0 4px 15px rgba(16,185,129,0.4)}
        .m-btn-claim.ready:active{transform:scale(0.97)}
        .m-btn-claim.locked{background:#283548;color:#94a3b8;cursor:not-allowed;border:1.5px solid rgba(255,255,255,0.1);font-weight:700}
        .m-card-actions{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06)}
        .m-act{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);cursor:pointer}
        .m-act:active{transform:scale(0.92)}
        .m-act .m-act-i{font-size:20px}
        .m-act .m-act-l{font-size:8px;font-weight:700;color:#94a3b8}
        .m-act.on{border-color:#22c55e;background:rgba(34,197,94,0.15)}
        .m-act.on .m-act-l{color:#4ade80}
        .m-editable{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:8px;padding:6px 10px;font-size:14px;color:#fbbf24;font-weight:800;text-align:right;width:80px;font-family:'Inter',sans-serif}
        .m-editable:focus{outline:none;border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,0.15)}
        .m-empty{text-align:center;padding:60px 20px;color:#64748b}
        .m-empty-icon{font-size:48px;margin-bottom:12px}
        .m-toast-c{position:fixed;top:60px;left:10px;right:10px;z-index:999;display:flex;flex-direction:column;gap:8px}
        .m-toast{padding:14px 18px;border-radius:12px;color:white;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.3);animation:mSlide .3s ease}
        .m-toast-ok{background:linear-gradient(135deg,#10b981,#059669)}
        .m-toast-err{background:linear-gradient(135deg,#ef4444,#dc2626)}
        @keyframes mSlide{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
        .m-spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,0.1);border-top-color:#ef4444;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;margin-bottom:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .m-filter{display:flex;gap:8px;padding:8px 12px;background:rgba(255,255,255,0.03)}
        .m-filter select{flex:1;padding:8px;border:1.5px solid rgba(255,255,255,0.12);border-radius:8px;font-size:13px;background:rgba(255,255,255,0.06);color:#e2e8f0;font-family:'Inter',sans-serif}
        .m-filter option{background:#1e293b;color:#e2e8f0}
        .m-pri{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:0.5px;display:inline-block;font-family:'Inter',sans-serif}
        .m-pri-chuan{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,0.4)}
        .m-pri-gap{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 2px 8px rgba(220,38,38,0.35)}
        .m-pri-gui{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 2px 8px rgba(245,158,11,0.35)}
        .mm-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:9999;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .25s ease}
        .mm-overlay.show{opacity:1}
        .mm-sheet{background:#1e293b;border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(0.34,1.56,0.64,1)}
        .mm-overlay.show .mm-sheet{transform:translateY(0)}
        .mm-header{background:linear-gradient(135deg,#059669,#10b981);padding:18px 20px;display:flex;align-items:center;gap:12px;border-radius:20px 20px 0 0}
        .mm-header .mm-icon{font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
        .mm-header .mm-title{font-size:16px;font-weight:800;color:#fff}
        .mm-header .mm-sub{font-size:11px;color:rgba(255,255,255,0.8);margin-top:2px}
        .mm-body{padding:16px 20px}
        .mm-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
        .mm-row:last-child{border-bottom:none}
        .mm-lbl{font-size:12px;color:#94a3b8;font-weight:600}
        .mm-val{font-size:13px;color:#e2e8f0;font-weight:700;text-align:right;max-width:60%}
        .mm-phoi{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:12px;padding:12px 14px;margin-top:12px}
        .mm-phoi-title{font-size:10px;font-weight:700;color:#10b981;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
        .mm-phoi-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px}
        .mm-phoi-item .pn{color:#e2e8f0;font-weight:600;flex:1}
        .mm-phoi-item .pm{color:#94a3b8;font-size:11px}
        .mm-actions{display:flex;gap:10px;padding:16px 20px;border-top:1px solid rgba(255,255,255,0.06)}
        .mm-btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
        .mm-btn-ok{background:linear-gradient(135deg,#059669,#10b981);color:#fff;box-shadow:0 4px 15px rgba(16,185,129,0.3)}
        .mm-btn-ok:active{transform:scale(0.97)}
        .mm-btn-no{background:rgba(255,255,255,0.08);color:#94a3b8}
        .m-fab{position:fixed;bottom:20px;right:16px;z-index:90;padding:14px 20px;border:none;border-radius:50px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#ea580c,#f97316);color:#fff;box-shadow:0 6px 24px rgba(234,88,12,0.45);display:none;letter-spacing:0.5px}
        .m-fab:active{transform:scale(0.95)}
        .m-progress{display:flex;gap:4px;margin-bottom:16px}
        .m-progress-dot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.15)}
        .m-progress-dot.active{background:#f97316}
    </style>
</head>
<body>
    <div class="m-header">
        <img src="/images/logo.png" alt="Logo">
        <h1>✂️ BỘ PHẬN CẮT</h1>
        <span class="m-user" id="mUser">...</span>
    </div>
    <div class="m-toast-c" id="mToastC"></div>
    <div class="m-tabs" id="mTabs">
        <div class="m-tab active" data-tab="uncut" onclick="mSwitchTab('uncut')">🔴 Chưa Cắt <span class="m-tab-badge" id="mBadgeUncut">0</span></div>
        <div class="m-tab" data-tab="mine" onclick="mSwitchTab('mine')">📋 Đơn Tôi <span class="m-tab-badge" id="mBadgeMine" style="background:#f59e0b">0</span></div>
        <div class="m-tab" data-tab="history" onclick="mSwitchTab('history')">📅 Lịch Sử</div>
    </div>
    <button class="m-fab" id="mFab" onclick="mOpenMultiCut()">✂️+ CẮT NHIỀU ĐƠN</button>
    <div class="m-content" id="mContent">
        <div style="text-align:center;padding:60px 20px;color:#94a3b8"><div class="m-spinner"></div><div>Đang tải...</div></div>
    </div>
<script>
let mUser=null, mTab='uncut', mUncut=[], mMine=[], mHist=[];

async function mApi(url,method='GET',body=null){
    const opts={method,headers:{'Content-Type':'application/json'},credentials:'include'};
    if(body)opts.body=JSON.stringify(body);
    const res=await fetch(url,opts);
    if(res.status===401){window.location.href='/index.html';return;}
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Lỗi server');
    return data;
}

function mToast(msg,ok=true){
    const c=document.getElementById('mToastC'),d=document.createElement('div');
    d.className='m-toast '+(ok?'m-toast-ok':'m-toast-err');
    d.textContent=msg;c.appendChild(d);setTimeout(()=>d.remove(),3500);
}

function mFmt(d){if(!d)return'—';try{const p=d.split('T')[0].split('-');return p[2]+'/'+p[1]+'/'+p[0];}catch(e){return d;}}

function mPriClass(pri){
    if(pri==='GẤP') return 'm-pri m-pri-gap';
    if(pri==='GỬI') return 'm-pri m-pri-gui';
    return 'm-pri m-pri-chuan';
}

function mPriLabel(pri){ return pri || 'CHUẨN'; }

async function mInit(){
    try{
        const auth=await mApi('/api/auth/me');
        if(!auth.user){window.location.href='/index.html';return;}
        mUser=auth.user;
        document.getElementById('mUser').textContent=mUser.full_name||mUser.username;
        await mLoadAll();
    }catch(e){document.getElementById('mContent').innerHTML='<div class="m-empty"><div class="m-empty-icon">❌</div><div>Lỗi: '+e.message+'</div></div>';}
}

async function mLoadAll(){
    try{
        const [uncutRes, recRes]=await Promise.all([mApi('/api/cutting/unassigned'),mApi('/api/cutting/records?_=1')]);
        mUncut=uncutRes.orders||[];
        const allRec=recRes.records||[];
        mMine=allRec.filter(r=>!r.is_cut_done);
        mHist=allRec.filter(r=>r.is_cut_done);
        document.getElementById('mBadgeUncut').textContent=mUncut.length;
        document.getElementById('mBadgeMine').textContent=mMine.length;
        mRender();
    }catch(e){console.error(e);}
}

function mSwitchTab(tab){
    mTab=tab;
    document.querySelectorAll('.m-tab').forEach(t=>{t.classList.toggle('active',t.dataset.tab===tab);});
    mRender();
}

function mRender(){
    if(mTab==='uncut')mRenderUncut();
    else if(mTab==='mine')mRenderMine();
    else mRenderHist();
    mUpdateFab();
}

function mRenderUncut(){
    const c=document.getElementById('mContent');
    if(!mUncut.length){c.innerHTML='<div class="m-empty"><div class="m-empty-icon">✅</div><div style="font-size:16px;font-weight:700;margin-bottom:4px">Không có đơn chờ</div><div style="font-size:13px">Tất cả đơn đã được nhận</div></div>';return;}

    // Group by phiếu (item) — use Map to preserve API sort order
    const grouped=new Map();
    mUncut.forEach(r=>{
        const k=r.id+'_'+(r.item_id||0);
        if(!grouped.has(k))grouped.set(k,{order:r,phois:[]});
        grouped.get(k).phois.push(r);
    });

    let cardHtml='';
    grouped.forEach(g=>{
        const o=g.order, ready=o.fabric_arrived&&o.has_pc_in;
        const priCls=mPriClass(o.shipping_priority);
        const priLbl=mPriLabel(o.shipping_priority);
        const cardTitle=(o.total_items_in_order>1)?o.order_code+' — Phiếu '+o.item_index:o.order_code;
        let h='<div class="m-card"><div class="m-card-top">';
        h+='<div class="m-card-icon">'+(ready?'🟢':'🔴')+'</div>';
        h+='<div class="m-card-title">'+cardTitle+'</div>';
        h+='<span class="'+priCls+'">'+priLbl+'</span>';
        h+='</div><div class="m-card-body">';
        h+='<div class="m-row"><span class="m-lbl">👤 Khách</span><span class="m-val">'+(o.customer_name||'—')+'</span></div>';
        // NV Sale (CSKH)
        const saleName = o.cskh_name || o.created_by_name || '';
        if(saleName) h+='<div class="m-row"><span class="m-lbl">💼 NV Sale</span><span class="m-val" style="color:#60a5fa;font-size:12px">'+saleName+'</span></div>';
        h+='<div class="m-row"><span class="m-lbl">📅 Ngày Ra Đơn</span><span class="m-val">'+mFmt(o.expected_ship_date)+'</span></div>';
        var itemQtySum = 0; g.phois.forEach(p=>{ itemQtySum += Number(p.item_qty)||0; });
        h+='<div class="m-row"><span class="m-lbl">📦 Số Lượng Sản Phẩm</span><span class="m-val" style="color:#60a5fa">'+(itemQtySum||o.total_quantity||'—')+'</span></div>';
        h+='<div class="m-divider"></div>';

        // Render each phối with full name
        g.phois.forEach(p=>{
            // Build phối name like desktop: "VTTI0002 — Phiếu 1 — P1 — ÁO CỔ BẺ"
            let spName;
            if(p.total_phoi > 1){
                spName = o.order_code + ' — Phiếu ' + p.item_index + ' — P' + p.phoi_in_item + (p.item_desc ? ' — ' + p.item_desc : '');
            } else {
                spName = o.order_code + (p.item_desc ? ' — ' + p.item_desc : '');
            }
            const itemQty = p.item_qty || '';
            h+='<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)">';
            h+='<div style="display:flex;justify-content:space-between;align-items:center">';
            h+='<div style="font-size:12px;font-weight:700;color:#e2e8f0;flex:1">'+spName+'</div>';
            if(itemQty) h+='<div style="font-size:12px;font-weight:800;color:#60a5fa;margin-left:8px">SL: '+itemQty+'</div>';
            h+='</div>';
            h+='<div style="display:flex;gap:8px;margin-top:4px;font-size:11px">';
            h+='<span style="color:#94a3b8">🧵 '+(p.material_name||'—')+'</span>';
            h+='<span style="color:#94a3b8">🎨 '+(p.color_name||'—')+'</span>';
            h+='</div></div>';
        });

        h+='<div class="m-divider"></div>';
        // Status badges
        h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin:6px 0">';
        h+='<span class="m-badge '+(o.fabric_arrived?'m-badge-ok':'m-badge-no')+'">'+(o.fabric_arrived?'✅ Vải đã về':'❌ Chưa có vải')+'</span>';
        h+='<span class="m-badge '+(o.has_pc_in?'m-badge-ok':'m-badge-no')+'">'+(o.has_pc_in?'✅ Đã PC In':'❌ Chưa PC In')+'</span>';
        h+='</div>';
        // Claim button
        if(ready){
            h+='<button class="m-btn-claim ready" onclick="mClaim('+o.id+','+(o.item_id||'null')+',\''+o.order_code+'\')">✂️ NHẬN ĐƠN CẮT</button>';
        }else{
            const miss=[];if(!o.fabric_arrived)miss.push('Vải');if(!o.has_pc_in)miss.push('PC In');
            h+='<button class="m-btn-claim locked" disabled>🔒 CHƯA ĐỦ ĐIỀU KIỆN — Thiếu '+miss.join(' + ')+'</button>';
        }
        h+='</div></div>';
        cardHtml+=h;
    });
    c.innerHTML=cardHtml||'<div class="m-empty"><div class="m-empty-icon">✅</div><div>Không có đơn chờ</div></div>';
}

function mRenderMine(){
    const c=document.getElementById('mContent');
    if(!mMine.length){c.innerHTML='<div class="m-empty"><div class="m-empty-icon">📋</div><div style="font-size:16px;font-weight:700;margin-bottom:4px">Chưa có đơn nào</div><div style="font-size:13px">Nhận đơn ở tab "Chưa Cắt"</div></div>';return;}
    c.innerHTML=mMine.map(r=>{
        const doneCls=r.is_cut_done?' on':'';
        const salCls=r.salary_approved?' on':'',washCls=r.wash_reported?' on':'';
        const ccBadge=r.cutting_category?'<span style="background:rgba(99,102,241,0.2);color:#a5b4fc;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;margin-left:6px">'+r.cutting_category+'</span>':'';
        // Cut/Done button visibility: not cutting→show cut, hide done; cutting→hide cut, show done
        let actionHtml='';
        if(!r.is_cutting){
            actionHtml+='<button style="width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;font-family:Inter,sans-serif;background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 4px 15px rgba(239,68,68,0.4);margin:8px 0" onclick="mOpenCutModal('+r.id+')">✂️ BẮT ĐẦU CẮT</button>';
        } else {
            const doneBg=r.is_cut_done?'linear-gradient(135deg,#059669,#10b981)':'linear-gradient(135deg,#1e40af,#3b82f6)';
            const doneTxt=r.is_cut_done?'✅ ĐÃ CẮT XONG':'🏁 CẮT XONG';
            if(r.is_cut_done){
                actionHtml+='<button style="width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;font-family:Inter,sans-serif;background:'+doneBg+';color:#fff;box-shadow:0 4px 15px rgba(59,130,246,0.4);margin:8px 0" onclick="mToggle('+r.id+',\'undo_cut_done\')">'+doneTxt+'</button>';
            } else {
                actionHtml+='<button style="width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;font-family:Inter,sans-serif;background:'+doneBg+';color:#fff;box-shadow:0 4px 15px rgba(59,130,246,0.4);margin:8px 0" onclick="mOpenDoneModal('+r.id+')">'+doneTxt+'</button>';
            }
        }
        return '<div class="m-card"><div class="m-card-top">'
            +'<div class="m-card-icon">'+(r.is_cut_done?'✅':r.is_cutting?'✂️':'📋')+'</div>'
            +'<div class="m-card-title">'+(r.product_name||'Sản phẩm')+ccBadge+'</div>'
            +'<div class="m-card-code">'+(r.order_code||'')+'</div></div>'
            +'<div style="padding:4px 16px"><span style="font-size:10px;color:#60a5fa;cursor:pointer;border-bottom:1px dashed #60a5fa" onclick="event.stopPropagation();mOpenDetail('+r.id+')">📋 Xem chi tiết</span></div>'
            +'<div class="m-card-body">'
            +'<div class="m-row"><span class="m-lbl">🧵 Chất liệu</span><span class="m-val">'+(r.material_name||'—')+'</span></div>'
            +'<div class="m-row"><span class="m-lbl">🎨 Màu</span><span class="m-val">'+(r.fabric_color||'—')+'</span></div>'
            +'<div class="m-row"><span class="m-lbl">📦 SL Đơn</span><span class="m-val" style="color:#60a5fa">'+(r.order_quantity||'—')+'</span></div>'

async function mClaim(id,itemId,code){
    if(window._mBusy)return;
    // Find phoi rows for this claim unit
    const gk=id+'_'+(itemId||0);
    const rows=mUncut.filter(r=>(r.id+'_'+(r.item_id||0))===gk);
    const o=rows[0]||{};
    const title=(o.total_items_in_order>1)?o.order_code+' — Phiếu '+o.item_index:o.order_code;
    const priMap={'GẤP':['🔴 GẤP','m-pri-gap'],'GỬI':['🟡 GỬI','m-pri-gui']};
    const pri=priMap[o.shipping_priority]||['🟣 CHUẨN','m-pri-chuan'];

    let h='<div class="mm-overlay" id="_mmModal" onclick="if(event.target===this)_mmClose()">';
    h+='<div class="mm-sheet">';
    h+='<div class="mm-header"><div class="mm-icon">✂️</div><div><div class="mm-title">Nhận Đơn Cắt</div><div class="mm-sub">Xác nhận nhận phiếu cắt này</div></div></div>';
    h+='<div class="mm-body">';
    h+='<div class="mm-row"><span class="mm-lbl">📋 Mã đơn</span><span class="mm-val" style="color:#10b981;font-size:15px">'+title+'</span></div>';
    h+='<div class="mm-row"><span class="mm-lbl">👤 Khách hàng</span><span class="mm-val">'+(o.customer_name||'—')+'</span></div>';
    const sale=o.cskh_name||o.created_by_name||'';
    if(sale) h+='<div class="mm-row"><span class="mm-lbl">💼 NV Sale</span><span class="mm-val" style="color:#60a5fa">'+sale+'</span></div>';
    h+='<div class="mm-row"><span class="mm-lbl">📅 Ngày ship</span><span class="mm-val">'+mFmt(o.expected_ship_date)+'</span></div>';
    h+='<div class="mm-row"><span class="mm-lbl">⚡ Ưu tiên</span><span class="mm-val"><span class="m-pri '+pri[1]+'">'+pri[0]+'</span></span></div>';
    if(rows.length>0){
        h+='<div class="mm-phoi"><div class="mm-phoi-title">📦 Danh sách phối ('+rows.length+')</div>';
        rows.forEach(p=>{
            const pn=(p.total_phoi>1)?('P'+p.phoi_in_item+(p.item_desc?' — '+p.item_desc:'')):(p.item_desc||o.order_code);
            h+='<div class="mm-phoi-item"><span class="pn">'+pn+'</span>';
            h+='<span class="pm">🧵 '+(p.material_name||'—')+' · 🎨 '+(p.color_name||'—')+'</span></div>';
        });
        h+='</div>';
    }
    h+='</div>';
    h+='<div class="mm-actions">';
    h+='<button class="mm-btn mm-btn-no" onclick="_mmClose()">Hủy</button>';
    h+='<button class="mm-btn mm-btn-ok" id="_mmOk" onclick="_mmDoClaimOrder('+id+','+(itemId||'null')+',\''+code+'\')">✂️ XÁC NHẬN</button>';
    h+='</div></div></div>';

    document.body.insertAdjacentHTML('beforeend',h);
    requestAnimationFrame(()=>document.getElementById('_mmModal').classList.add('show'));
}

function _mmClose(){
    const m=document.getElementById('_mmModal');
    if(m){m.classList.remove('show');setTimeout(()=>m.remove(),350);}
}

async function _mmDoClaimOrder(id,itemId,code){
    if(window._mBusy)return;
    window._mBusy=true;
    const btn=document.getElementById('_mmOk');
    if(btn){btn.disabled=true;btn.textContent='⏳ Đang xử lý...';}
    try{
        const body={dht_order_id:id};
        if(itemId) body.order_item_id=itemId;
        const res=await mApi('/api/cutting/claim','POST',body);
        _mmClose();
        mToast('✅ Đã nhận đơn '+code+' — '+res.created+' phối');
        await mLoadAll();
    }catch(e){
        mToast(e.message,false);
        if(btn){btn.disabled=false;btn.textContent='✂️ XÁC NHẬN';}
    }finally{window._mBusy=false;}
}

async function mToggle(id,action){

function mRecalcKg(){
    const cbs=document.querySelectorAll('._mRollCb:checked');
    let t=0;cbs.forEach(cb=>{t+=parseFloat(cb.dataset.weight)||0;});
    const el=document.getElementById('_mKgDisp');
    if(el) el.textContent=t.toFixed(2)+' kg';
}

function mCloseCutModal(){

async function mDoCut(recordId){
    const cbs=document.querySelectorAll('._mRollCb:checked');
    if(!cbs.length){mToast('Chọn ít nhất 1 cây vải',false);return;}
    const ids=[];cbs.forEach(cb=>ids.push(Number(cb.value)));
    const btn=document.getElementById('_mmCutOk');
    if(btn){btn.disabled=true;btn.textContent='⏳...';}
    try{
        await mApi('/api/cutting/toggle/'+recordId,'POST',{action:'start_cutting',selected_roll_ids:ids});
        mCloseCutModal();
        mToast('✅ Đã bắt đầu cắt — '+ids.length+' cây');
        await mLoadAll();
    }catch(e){
        mToast(e.message||'Lỗi',false);
        if(btn){btn.disabled=false;btn.textContent='✂️ XÁC NHẬN CẮT';}
    }
}

async function mSubmitDone(recordId){
    const d=window._mDoneData;if(!d)return;
    const qty=parseInt(document.getElementById('_mDoneQty').value);
    if(!qty||qty<=0){mToast('Nhập Số Lượng Cắt',false);return;}
    if(d.orderQty&&qty>d.orderQty){mToast('Số Lượng Cắt > Số Lượng Sản Phẩm',false);return;}
    // Validate: must select rolls or click "Cắt hết"
    const hasCheckedRoll=document.querySelectorAll('._mDoneRollCb:checked').length>0;
    if(!hasCheckedRoll && !d._allCut){mToast('Chọn cây còn lại hoặc ấn "Cắt hết"',false);return;}
    const rollRemains=[];let err=false;
    document.querySelectorAll('._mDoneRollCb').forEach(cb=>{
        if(cb.checked){const k=document.getElementById('_mDoneRollKg_'+cb.dataset.idx);const v=k?parseFloat(k.value):0;const mx=parseFloat(cb.dataset.weight)||0;
        if(!v||v<=0){err=true;if(k)k.style.border='2px solid #ef4444';}
        if(v>mx){err=true;mToast('Kg > '+mx,false);}
        rollRemains.push({roll_id:Number(cb.dataset.rollid),remaining_weight:v});}
    });
    if(err){mToast('Kiểm tra kg còn lại',false);return;}
    const uc=d.rolls.length-rollRemains.length;
    if(uc>0&&!confirm(uc+' cây sẽ cắt hết (0kg). OK?'))return;
    const body={action:'cut_done',cut_quantity:qty,roll_remains:rollRemains};
    const reason=document.getElementById('_mDoneReason');if(reason&&reason.value.trim())body.ratio_reason=reason.value.trim();
    if(d.imgData)body.ratio_image=d.imgData;
    const btn=document.getElementById('_mDoneOk');if(btn){btn.disabled=true;btn.textContent='⏳...';}
    try{await mApi('/api/cutting/toggle/'+recordId,'POST',body);mCloseDoneModal();mToast('✅ Cắt xong!');await mLoadAll();}
    catch(e){mToast(e.message||'Lỗi',false);if(btn){btn.disabled=false;btn.textContent='🏁 XÁC NHẬN';}}
}

    });
    if(err){mToast('Kiểm tra kg còn lại',false);return;}
    const uc=d.rolls.length-rollRemains.length;
    if(uc>0&&!confirm(uc+' cây sẽ cắt hết (0kg). OK?'))return;
    const body={group_id:d.groupId,items,roll_remains:rollRemains};
    const btn=document.getElementById('_mGDoneOk');if(btn){btn.disabled=true;btn.textContent='⏳...';}
    try{
        await mApi('/api/cutting/multi-cut/done','POST',body);

        mats.forEach(m=>{if(!matM[m.material_name]){matM[m.material_name]=[];matN.push(m.material_name);}matM[m.material_name].push(m);});
        var h=prog+'<div style="font-size:10px;font-weight:800;color:#f97316;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">BƯỚC 1: CHẤT LIỆU & MÀU</div>';
        h+='<div style="margin-bottom:10px"><div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:4px">🧵 Chất Liệu *</div>';
        h+='<select id="_mmMatS" onchange="mMCMatCh()" style="width:100%;padding:10px;border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;font-size:14px;font-weight:700;background:#fff;color:#000;font-family:Inter,sans-serif"><option value="" style="color:#000;background:#fff">— Chọn —</option>';
        matN.forEach(n=>{h+='<option value="'+n+'" style="color:#000;background:#fff"'+(n===_mm.selMat?' selected':'')+'>'+n+'</option>';});
        h+='</select></div>';
        h+='<div style="margin-bottom:10px"><div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:4px">🎨 Màu Sắc *</div>';
        h+='<select id="_mmColS" onchange="mMCColCh()" style="width:100%;padding:10px;border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;font-size:14px;font-weight:700;background:#fff;color:#000;font-family:Inter,sans-serif"><option value="" style="color:#000;background:#fff">— Chọn —</option>';
        if(_mm.selMat&&matM[_mm.selMat])matM[_mm.selMat].forEach(m=>{h+='<option value="'+m.color_name+'" style="color:#000;background:#fff"'+(m.color_name===_mm.selColor?' selected':'')+'>'+m.color_name+' ('+m.roll_count+' cây)</option>';});
        h+='</select></div>';
        bd.innerHTML=h;
        if(nx)nx.textContent='Tiếp ▶';
    }else if(_mm.step===2){
        var h=prog+'<div style="font-size:10px;font-weight:800;color:#f97316;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">BƯỚC 2: CHỌN CÂY VẢI</div>';
        h+='<div style="font-size:11px;color:#94a3b8;margin-bottom:10px">🧵 '+_mm.selMat+' · 🎨 '+_mm.selColor+'</div>';
        if(!_mm.rolls.length)h+='<div style="text-align:center;padding:16px;color:#fbbf24;background:rgba(251,191,36,0.1);border-radius:8px">⚠️ Không có cây vải</div>';
        else _mm.rolls.forEach(r=>{
            var dis=r.locked?' disabled':'',op=r.locked?'opacity:0.4;':'',chk=_mm.selRolls.indexOf(r.id)>=0?' checked':'';
            h+='<label style="display:flex;align-items:center;gap:10px;padding:10px;border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;margin-bottom:6px;cursor:'+(r.locked?'not-allowed':'pointer')+';'+op+'">';
            h+='<input type="checkbox" class="_mmRCb" value="'+r.id+'" data-weight="'+r.weight+'"'+dis+chk+' onchange="mMCRollCh()" style="width:20px;height:20px;accent-color:#f97316">';
            h+='<span style="flex:1;font-size:12px;font-weight:700;color:#e2e8f0">'+r.label+'</span>';
            if(r.locked)h+='<span style="color:#ef4444;font-size:9px">🔒 '+(r.locked_order?r.locked_order+' — ':'')+(r.locked_by||'')+'</span>';
            h+='</label>';
        });
        h+='<div style="border-top:1px solid rgba(255,255,255,0.08);margin-top:8px;padding-top:10px;display:flex;justify-content:space-between"><span style="font-size:12px;font-weight:800;color:#e2e8f0">⚖️ KG ĐẦU</span><span id="_mmKgD" style="font-size:20px;font-weight:900;color:#f97316">0.00 kg</span></div>';
        bd.innerHTML=h;mMCRollCh();
        if(nx)nx.textContent='Tiếp ▶';
    }else if(_mm.step===3){
        var readyCount=0;_mm.candidates.forEach(c=>{if(c.canSelect)readyCount++;});
        var h=prog+'<div style="font-size:10px;font-weight:800;color:#f97316;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">BƯỚC 3: CHỌN ĐƠN GỘP</div>';
        if(!_mm.candidates.length)h+='<div style="text-align:center;padding:16px;color:#fbbf24;background:rgba(251,191,36,0.1);border-radius:8px">⚠️ Không có đơn chưa nhận phù hợp</div>';
        else if(readyCount<2)h+='<div style="text-align:center;padding:16px;color:#fbbf24;background:rgba(251,191,36,0.1);border-radius:8px;margin-bottom:8px">⚠️ Chỉ có '+readyCount+' đơn sẵn sàng — cần ít nhất 2</div>';
        if(_mm.candidates.length>0){
            _mm.candidates.forEach(c=>{
                var dis=c.canSelect?'':' disabled',op=c.canSelect?'':'opacity:0.45;';
                var bc=c.canSelect?'rgba(255,255,255,0.12)':'rgba(239,68,68,0.3)';
                var chk=_mm.selOrders.indexOf(c.order_item_id)>=0?' checked':'';
                h+='<label style="display:flex;align-items:center;gap:10px;padding:10px;border:1.5px solid '+bc+';border-radius:10px;margin-bottom:6px;cursor:'+(c.canSelect?'pointer':'not-allowed')+';'+op+'">';
                h+='<input type="checkbox" class="_mmOCb" value="'+c.order_item_id+'"'+dis+chk+' onchange="mMCOrdCh()" style="width:20px;height:20px;accent-color:#f97316">';
                h+='<div style="flex:1"><div style="font-size:12px;font-weight:700;color:#e2e8f0">'+c.order_code+(c.description?' — '+c.description:'')+'</div>';
                h+='<div style="font-size:10px;color:#94a3b8;margin-top:2px">SL: '+(c.quantity||'—')+' · '+(c.customer_name||'')+'</div></div>';
                if(!c.canSelect)h+='<span style="font-size:8px;font-weight:700;color:#fca5a5;white-space:nowrap">'+c.statusLabel+'</span>';
                else h+='<span style="font-size:8px;font-weight:700;color:#4ade80;white-space:nowrap">'+c.statusLabel+'</span>';
                h+='</label>';
            });
        }
        bd.innerHTML=h;
        if(nx)nx.textContent='Tiếp ▶';
    }else if(_mm.step===4){
        var so=_mm.candidates.filter(c=>_mm.selOrders.indexOf(c.order_item_id)>=0);
        var tk=0;_mm.rolls.forEach(r=>{if(_mm.selRolls.indexOf(r.id)>=0)tk+=r.weight;});
        var h=prog+'<div style="font-size:10px;font-weight:800;color:#f97316;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">BƯỚC 4: XÁC NHẬN</div>';
        h+='<div class="mm-row"><span class="mm-lbl">🧵 Chất liệu</span><span class="mm-val" style="color:#f97316">'+_mm.selMat+'</span></div>';
        h+='<div class="mm-row"><span class="mm-lbl">🎨 Màu</span><span class="mm-val">'+_mm.selColor+'</span></div>';
        h+='<div class="mm-row"><span class="mm-lbl">📦 Cây vải</span><span class="mm-val" style="color:#f97316">'+_mm.selRolls.length+' cây</span></div>';
        h+='<div class="mm-row"><span class="mm-lbl">⚖️ Kg đầu</span><span class="mm-val" style="color:#f97316;font-size:18px">'+tk.toFixed(2)+' kg</span></div>';
        h+='<div style="border-top:1px solid rgba(255,255,255,0.08);margin:8px 0;padding-top:8px"><div style="font-size:10px;font-weight:700;color:#4ade80;margin-bottom:6px">📋 ĐƠN ('+so.length+') — sẽ tự nhận + cắt</div>';
        so.forEach(o=>{h+='<div style="padding:6px 10px;border:1px solid rgba(34,197,94,0.2);border-radius:8px;margin-bottom:4px;font-size:11px;font-weight:600;color:#e2e8f0">'+o.order_code+(o.description?' — '+o.description:'')+' · SL: '+(o.quantity||'—')+'</div>';});
        h+='</div>';bd.innerHTML=h;
        if(nx){nx.textContent='✂️ XÁC NHẬN';nx.style.background='linear-gradient(135deg,#059669,#10b981)';}
    }
}
function mMCMatCh(){var s=document.getElementById('_mmMatS');_mm.selMat=s?s.value:'';_mm.selColor='';mMCRender();}
function mMCColCh(){var s=document.getElementById('_mmColS');_mm.selColor=s?s.value:'';}
function mMCRollCh(){var cbs=document.querySelectorAll('._mmRCb:checked');var ids=[],kg=0;cbs.forEach(cb=>{ids.push(Number(cb.value));kg+=parseFloat(cb.dataset.weight)||0;});_mm.selRolls=ids;var el=document.getElementById('_mmKgD');if(el)el.textContent=kg.toFixed(2)+' kg';}
function mMCOrdCh(){var cbs=document.querySelectorAll('._mmOCb:checked');var ids=[];cbs.forEach(cb=>ids.push(Number(cb.value)));_mm.selOrders=ids;}
function mMCBack(){if(_mm.step>1){_mm.step--;mMCRender();}}
async function mMCNext(){
    if(_mm.step===1){
        if(!_mm.selMat||!_mm.selColor){mToast('Chọn chất liệu và màu',false);return;}
        try{
            var r1=await mApi('/api/cutting/available-rolls?material_name='+encodeURIComponent(_mm.selMat)+'&color_name='+encodeURIComponent(_mm.selColor));
            _mm.rolls=r1.rolls||[];
            var r2=await mApi('/api/cutting/multi-cut/candidates?material_name='+encodeURIComponent(_mm.selMat)+'&fabric_color='+encodeURIComponent(_mm.selColor));
            _mm.candidates=r2.candidates||[];
        }catch(e){mToast(e.message,false);return;}
        _mm.step=2;mMCRender();
    }else if(_mm.step===2){
        if(!_mm.selRolls.length){mToast('Chọn ít nhất 1 cây',false);return;}
        _mm.step=3;mMCRender();
    }else if(_mm.step===3){
        if(_mm.selOrders.length<2){mToast('Chọn ít nhất 2 đơn',false);return;}
        _mm.step=4;mMCRender();
    }else if(_mm.step===4){
        var btn=document.getElementById('_mmMCNext');if(btn){btn.disabled=true;btn.textContent='⏳...';}
        try{
            await mApi('/api/cutting/multi-cut','POST',{selected_roll_ids:_mm.selRolls,selected_order_item_ids:_mm.selOrders,material_name:_mm.selMat,fabric_color:_mm.selColor});
            mCloseMC();mToast('✅ Đã cắt chung '+_mm.selOrders.length+' đơn!');await mLoadAll();
        }catch(e){mToast(e.message||'Lỗi',false);if(btn){btn.disabled=false;btn.textContent='✂️ XÁC NHẬN';}}
    }
}

mInit();
</script>
</body>
</html>
