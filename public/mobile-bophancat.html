    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;color:#e2e8f0;padding-bottom:70px}
        .m-header{background:linear-gradient(135deg,#7f1d1d,#991b1b);padding:14px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.3);position:sticky;top:0;z-index:100}
        .m-header img{width:32px;height:32px;border-radius:8px}
        .m-header h1{font-size:15px;font-weight:800;color:#fca5a5;flex:1}
        .m-user{font-size:10px;color:#fecaca;font-weight:600;background:rgba(255,255,255,0.1);padding:4px 8px;border-radius:6px}
        .m-tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;scrollbar-width:none;background:#1a2332;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:60px;z-index:99}

<script>
let html5QrcodeScanner = null;

function mScanQR() {
    if (window.location.protocol === 'http:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        mToast("❌ Cần kết nối bảo mật HTTPS để dùng camera!", false);
        alert("Để sử dụng camera quét mã QR, vui lòng truy cập địa chỉ có bảo mật (https):\nhttps://" + window.location.host + window.location.pathname + window.location.search);
        return;
    }
    let overlay = document.getElementById('qrScannerOverlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'qrScannerOverlay';
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,0.85);backdrop-filter:blur(8px);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';
        overlay.innerHTML = `
            <div style="width:100%;max-width:400px;background:#1f2937;border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:24px;box-shadow:0 20px 40px rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;gap:20px;">
                <div style="width:100%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:12px;">
                    <h3 style="font-size:16px;font-weight:800;color:#f97316;margin:0;">📷 QUÉT MÃ QR</h3>
                    <button onclick="stopQRScan()" style="background:none;border:none;color:#9ca3af;font-size:20px;cursor:pointer;line-height:1;">&times;</button>
                </div>
                <div id="qrReader" style="width:100%;aspect-ratio:1;background:#111827;border-radius:16px;overflow:hidden;border:2px dashed rgba(249,115,22,0.3);position:relative;">
                </div>
                <div style="font-size:12px;color:#9ca3af;text-align:center;line-height:1.5;">
                    Di chuyển camera đến gần mã QR của đơn hàng để quét tự động.
                </div>
                <button onclick="stopQRScan()" style="width:100%;padding:12px;background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.2);border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;">
                    HỦY BỎ
                </button>
            </div>
        `;
        document.body.appendChild(overlay);
    } else {
        overlay.style.display = 'flex';
    }

    html5QrcodeScanner = new Html5Qrcode("qrReader");
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };

    html5QrcodeScanner.start(
        { facingMode: "environment" },
        config,
        onScanSuccess,
        onScanFailure
    ).catch(err => {
        console.error("Camera access error:", err);
        html5QrcodeScanner.start(
            { facingMode: "user" },
            config,
            onScanSuccess,
            onScanFailure
        ).catch(err2 => {
            mToast("❌ Không thể truy cập camera. Vui lòng cấp quyền camera!", false);
            stopQRScan();
        });
    });
}

function onScanSuccess(decodedText) {
    mToast("✅ Đã quét thành công!");
    const searchInp = document.getElementById('mSearchInp');
    if (searchInp) {
        searchInp.value = decodedText.trim();
        mDoSearch();
    }
    stopQRScan();
}

function onScanFailure(error) {
}

function stopQRScan() {
    const overlay = document.getElementById('qrScannerOverlay');
    if (overlay) {
        overlay.style.display = 'none';
    }
    if (html5QrcodeScanner) {
        html5QrcodeScanner.stop().then(() => {
            html5QrcodeScanner.clear();
            html5QrcodeScanner = null;
        }).catch(err => {
            console.error("Failed to stop scanner:", err);
            html5QrcodeScanner = null;
        });
    }
}

let mUser=null, mTab='delayed', mUncut=[], mMine=[], mHist=[], mSearchQuery='';

function mDoSearch() {
    const inp = document.getElementById('mSearchInp');
    mSearchQuery = (inp ? inp.value : '').trim().toLowerCase();
    const clearBtn = document.getElementById('mClearSearchBtn');
    if (clearBtn) {
        clearBtn.style.display = mSearchQuery ? 'block' : 'none';
    }
    mRender();
}

function mClearSearch() {
    const inp = document.getElementById('mSearchInp');
    if (inp) inp.value = '';
    mDoSearch();
}

function mFmtKg(val) {
    if (val === null || val === undefined || val === '' || val === '—') return '—';
    var str = String(val).replace(',', '.');
    var num = Number(str);
    if (isNaN(num)) return val;
    var parts = str.split('.');
    if (parts.length > 1 && parts[1].length > 0) {
        return parts[0] + '.' + parts[1].substring(0, 1);
    }
    return parts[0];
}

function mFormatOrderQty(qty, productName, cuttingCategory) {
    if (qty === null || qty === undefined || qty === '' || qty === '—') return '—';
    var phoiInItem = 1;
    if (productName) {
        var match = productName.match(/— P(\d+)/);
        if (match) phoiInItem = parseInt(match[1]);
    }
    if (phoiInItem === 1) {
        var suffix = cuttingCategory ? (' ' + cuttingCategory) : '';
        return qty + suffix;
    } else {
        return qty + ' Phối';
    }
}

async function mApi(url,method='GET',body=null){
    const opts={method,headers:{'Content-Type':'application/json'},credentials:'include'};
    if(body)opts.body=JSON.stringify(body);
    const res=await fetch(url,opts);
    if(res.status===401){window.location.href='/index.html';return;}
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Lỗi server');
    return data;
}

async function mSaveTargetRatios() {
    if(window._mSubmitBusy) return;
    window._mSubmitBusy = true;
    const inputs = document.querySelectorAll('._mRatioInput');
    const ratios = [];
    inputs.forEach(inp => {
        ratios.push({
            material_id: Number(inp.dataset.matId),
            cutting_category: inp.dataset.cat,
            target_ratio: parseFloat(inp.value.replace(/,/g, '.')) || 0
        });
    });

    const btn = document.querySelector('#_mRatioModal .mm-btn-ok');
    if(btn) { btn.disabled = true; btn.textContent = '⏳ Đang lưu...'; }

    try {
        await mApi('/api/cutting/target-ratios', 'POST', { ratios });
        mCloseRatioModal();
        mToast('✅ Đã lưu tỉ lệ định lượng!');
        await mLoadAll();
    } catch(e) {
        mToast(e.message || 'Lỗi', false);
        if(btn) { btn.disabled = false; btn.textContent = '💾 LƯU THAY ĐỔI'; }
    } finally {
        window._mSubmitBusy = false;
    }
}

async function mLoadAll(){
    try{
        const [uncutRes, recRes]=await Promise.all([mApi('/api/cutting/unassigned'),mApi('/api/cutting/records?_=1')]);
        mUncut=uncutRes.orders||[];
        const allRec=recRes.records||[];
        const groupNotDoneIds = new Set();
        allRec.forEach(r => {
            if (r.multi_cut_group_id && !r.is_cut_done) {
                groupNotDoneIds.add(r.multi_cut_group_id);
            }
        });
        mMine = allRec.filter(r => !r.is_cut_done || (r.multi_cut_group_id && groupNotDoneIds.has(r.multi_cut_group_id)));
        mHist = allRec.filter(r => r.is_cut_done && !(r.multi_cut_group_id && groupNotDoneIds.has(r.multi_cut_group_id)));

        // Sort mMine: is_cut_done first, then is_cutting first, then id desc
        mMine.sort((a, b) => {
            if (a.is_cut_done !== b.is_cut_done) return a.is_cut_done ? -1 : 1;
            if (a.is_cutting !== b.is_cutting) return a.is_cutting ? -1 : 1;
            return b.id - a.id;
        });

        // Sort mHist: id desc
        mHist.sort((a, b) => b.id - a.id);

        const todayVNStr = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Ho_Chi_Minh' });
        const todayCount = mUncut.filter(r => r.cut_expected_at && r.cut_expected_at.split('T')[0] === todayVNStr).length;
        const delayedCount = mUncut.filter(r => r.cut_expected_at && r.cut_expected_at.split('T')[0] < todayVNStr).length;
        const futureUncutCount = mUncut.filter(r => !r.cut_expected_at || r.cut_expected_at.split('T')[0] > todayVNStr).length;

        document.getElementById('mBadgeToday').textContent = todayCount;
        document.getElementById('mBadgeDelayed').textContent = delayedCount;
        document.getElementById('mBadgeUncut').textContent = futureUncutCount;
        document.getElementById('mBadgeMine').textContent=mMine.filter(r=>!r.is_cut_done).length;
        mRender();
    }catch(e){console.error(e);}
}

            const mat = (o.material_name || '').toLowerCase();
            const col = (o.color_name || '').toLowerCase();
            return code.includes(mSearchQuery) || cust.includes(mSearchQuery) || sale.includes(mSearchQuery) || desc.includes(mSearchQuery) || mat.includes(mSearchQuery) || col.includes(mSearchQuery);
        });

        const matchedMine = mMine.filter(r => {
            const code = (r.order_code || '').toLowerCase();
            const prod = (r.product_name || '').toLowerCase();
            const cust = (r.customer_name || '').toLowerCase();
            const sale = (r.cskh_name || r.created_by_name || '').toLowerCase();
            const cutter = (r.cutter_name || '').toLowerCase();
            const mat = (r.material_name || '').toLowerCase();
            const col = (r.fabric_color || '').toLowerCase();
            return code.includes(mSearchQuery) || prod.includes(mSearchQuery) || cust.includes(mSearchQuery) || sale.includes(mSearchQuery) || cutter.includes(mSearchQuery) || mat.includes(mSearchQuery) || col.includes(mSearchQuery);
        });

        const matchedHist = mHist.filter(r => {
            const code = (r.order_code || '').toLowerCase();
            const prod = (r.product_name || '').toLowerCase();
            const cust = (r.customer_name || '').toLowerCase();
            const sale = (r.cskh_name || r.created_by_name || '').toLowerCase();
            const cutter = (r.cutter_name || '').toLowerCase();
            const mat = (r.material_name || '').toLowerCase();
            const col = (r.fabric_color || '').toLowerCase();
            return code.includes(mSearchQuery) || prod.includes(mSearchQuery) || cust.includes(mSearchQuery) || sale.includes(mSearchQuery) || cutter.includes(mSearchQuery) || mat.includes(mSearchQuery) || col.includes(mSearchQuery);
        });

        const htmlUncut = mRenderUncut(matchedUncut, true);
        const htmlMine = mRenderMine(matchedMine, true);
        const htmlHist = mRenderHist(matchedHist, true);

        const totalHtml = (htmlUncut || '') + (htmlMine || '') + (htmlHist || '');
        const c = document.getElementById('mContent');
        if (totalHtml) {
            c.innerHTML = totalHtml;
        } else {
            c.innerHTML = '<div class="m-empty"><div class="m-empty-icon">🔍</div><div style="font-size:16px;font-weight:700;margin-bottom:4px">Không tìm thấy kết quả</div><div style="font-size:13px">Thử tìm kiếm với từ khóa khác</div></div>';
        }
    } else {
        if (mTab === 'uncut' || mTab === 'today' || mTab === 'delayed') {
            const todayVNStr = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Ho_Chi_Minh' });
            let filtered = mUncut;
            if (mTab === 'today') {
                filtered = mUncut.filter(r => r.cut_expected_at && r.cut_expected_at.split('T')[0] === todayVNStr);
            } else if (mTab === 'delayed') {
                filtered = mUncut.filter(r => r.cut_expected_at && r.cut_expected_at.split('T')[0] < todayVNStr);
            } else if (mTab === 'uncut') {
                filtered = mUncut.filter(r => !r.cut_expected_at || r.cut_expected_at.split('T')[0] > todayVNStr);
            }
            mRenderUncut(filtered);
        } else if (mTab === 'mine') {
            mRenderMine();
        } else {
            mRenderHist();
        }
    }
    mUpdateFab();
}

function mRenderUncut(items = null, showSectionBadge = false){
    const c=document.getElementById('mContent');
    let itemsToRender = items || mUncut;
    if (!items && mSearchQuery) {
        itemsToRender = mUncut.filter(o => {
            const code = (o.order_code || '').toLowerCase();
            const cust = (o.customer_name || '').toLowerCase();
            const sale = (o.cskh_name || o.created_by_name || '').toLowerCase();
            const desc = (o.item_desc || '').toLowerCase();
            const mat = (o.material_name || '').toLowerCase();
            const col = (o.color_name || '').toLowerCase();
            return code.includes(mSearchQuery) || cust.includes(mSearchQuery) || sale.includes(mSearchQuery) || desc.includes(mSearchQuery) || mat.includes(mSearchQuery) || col.includes(mSearchQuery);
        });
        if (!itemsToRender.length) {
            c.innerHTML = '<div class="m-empty"><div class="m-empty-icon">🔍</div><div style="font-size:16px;font-weight:700;margin-bottom:4px">Không tìm thấy kết quả</div><div style="font-size:13px">Thử tìm kiếm với từ khóa khác</div></div>';
            return;
        }
    } else if(!itemsToRender.length){
        if (showSectionBadge) return '';
        c.innerHTML='<div class="m-empty"><div class="m-empty-icon">✅</div><div style="font-size:16px;font-weight:700;margin-bottom:4px">Không có đơn chờ</div><div style="font-size:13px">Tất cả đơn đã được nhận</div></div>';
        return;
    }

    // Group by phiếu (item) — use Map to preserve API sort order
    const grouped=new Map();
    let idx = 0;
    itemsToRender.forEach(r=>{
        const k=r.id+'_'+(r.item_id||0);
        if(!grouped.has(k))grouped.set(k,{order:r,phois:[],index:idx++});
        grouped.get(k).phois.push(r);
    });

    // Sort: ready (fabric_arrived && has_pc_in) first, then original order
    const sortedGroups = Array.from(grouped.values()).sort((a, b) => {
        const aReady = a.order.fabric_arrived && a.order.has_pc_in;
        const bReady = b.order.fabric_arrived && b.order.has_pc_in;
        if (aReady !== bReady) {
            return aReady ? -1 : 1;
        }
        return a.index - b.index;
    });

    let cardHtml='';
    sortedGroups.forEach(g=>{
        const o=g.order, ready=o.fabric_arrived&&o.has_pc_in;
        const priCls=mPriClass(o.shipping_priority);
        const priLbl=mPriLabel(o.shipping_priority);
        const cardTitle=(o.total_items_in_order>1)?o.order_code+' — Phiếu '+o.item_index:o.order_code;
        const sectBadge = showSectionBadge ? '<span style="background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; margin-left: 6px; text-transform: uppercase;">Chưa Cắt</span>' : '';
        const compBadge=o.cut_warning?'<span style="background:#ea580c;color:#fff;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:800;margin-left:6px;display:inline-block;vertical-align:middle;text-transform:uppercase">Cắt Bù</span>':'';
        let h='<div class="m-card"><div class="m-card-top">';
        h+='<div class="m-card-icon">'+(ready?'🟢':'🔴')+'</div>';
        h+='<div class="m-card-title">'+cardTitle+compBadge+sectBadge+'</div>';
        h+='<span class="'+priCls+'">'+priLbl+'</span>';
        h+='</div><div class="m-card-body">';
        h+='<div class="m-row"><span class="m-lbl">👤 Khách</span><span class="m-val">'+(o.customer_name||'—')+'</span></div>';
        if(o.cut_warning){
            h+='<div style="background:rgba(234,88,12,0.15);border:1px solid rgba(234,88,12,0.3);border-radius:6px;padding:6px 10px;margin:6px 0;font-size:11px;font-weight:700;color:#f97316">⚠️ '+o.cut_warning+'</div>';
        }
        // NV Sale (CSKH)
        const saleName = o.cskh_name || o.created_by_name || '';
        if(saleName) h+='<div class="m-row"><span class="m-lbl">💼 NV Sale</span><span class="m-val" style="color:#60a5fa;font-size:12px">'+saleName+'</span></div>';
        
        if (o.cut_expected_at) {
            const schDateStr = o.cut_expected_at.split('T')[0];
            const todayVNStr = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Ho_Chi_Minh' });
            const d = new Date(o.cut_expected_at);
            const dayNames = ['Chủ Nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            const dayName = dayNames[d.getDay()];
            const dateStr = String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
            let displayStr = '📅 ' + dayName + ', ' + dateStr;
            let valStyle = 'color: #e2e8f0';

            if (schDateStr === todayVNStr) {
                displayStr = '🔥 HÔM NAY: ' + dayName + ', ' + dateStr;
                valStyle = 'color: #3b82f6; font-weight: 900; animation: bpcReminderPulseMobile 2s infinite;';
            } else if (schDateStr < todayVNStr) {
                displayStr = '⚠️ TRỄ: ' + dayName + ', ' + dateStr;

function mGetVNDate(dateInput) {
    const d = dateInput ? new Date(dateInput) : new Date();
    if (isNaN(d.getTime())) return null;
    const vnTime = new Date(d.getTime() + (7 * 3600 * 1000));
    return {
        year: vnTime.getUTCFullYear(),
        month: vnTime.getUTCMonth() + 1,
        date: vnTime.getUTCDate(),
        day: vnTime.getUTCDay()
    };
}

function mFilterHistoryList(list) {
    const filterType = document.getElementById('mHistFilterType') ? document.getElementById('mHistFilterType').value : 'month';
    const nowVN = mGetVNDate();
    
    // Calculate start and end of this week
    const now = new Date();
    const nowVNTime = new Date(now.getTime() + (7 * 3600 * 1000));
    const todayVNStart = new Date(Date.UTC(nowVNTime.getUTCFullYear(), nowVNTime.getUTCMonth(), nowVNTime.getUTCDate(), 0, 0, 0, 0));
    const currentDay = nowVNTime.getUTCDay();
    const mondayOffset = currentDay === 0 ? -6 : 1 - currentDay;
    const mondayVNStart = new Date(todayVNStart.getTime() + (mondayOffset * 24 * 3600 * 1000));
    const sundayVNEnd = new Date(mondayVNStart.getTime() + (7 * 24 * 3600 * 1000));

    return list.filter(r => {
        if (!r.cut_date) return false;
        const recVN = mGetVNDate(r.cut_date);
        if (!recVN) return false;

        if (filterType === 'today') {
            return recVN.year === nowVN.year && recVN.month === nowVN.month && recVN.date === nowVN.date;
        } else if (filterType === 'week') {
            const recTime = new Date(r.cut_date);
            const recVNTime = new Date(recTime.getTime() + (7 * 3600 * 1000));
            const recVNUTC = Date.UTC(recVNTime.getUTCFullYear(), recVNTime.getUTCMonth(), recVNTime.getUTCDate(), 0, 0, 0, 0);
            return recVNUTC >= mondayVNStart.getTime() && recVNUTC < sundayVNEnd.getTime();
        } else if (filterType === 'month') {
            return recVN.year === nowVN.year && recVN.month === nowVN.month;
        } else if (filterType === 'select_month') {
            const mSelect = document.getElementById('mHistMonthSelect');
            const ySelect = document.getElementById('mHistYearSelect');
            const selMonth = mSelect ? parseInt(mSelect.value) : nowVN.month;
            const selYear = ySelect ? parseInt(ySelect.value) : nowVN.year;
            return recVN.year === selYear && recVN.month === selMonth;
        } else if (filterType === 'select_year') {
            const ySelect = document.getElementById('mHistYearSelect');
            const selYear = ySelect ? parseInt(ySelect.value) : nowVN.year;
            return recVN.year === selYear;
        }
        return true;
    });
}

    } else if(!itemsToRender.length){
        if (showSectionBadge) return '';
        c.innerHTML='<div class="m-empty"><div class="m-empty-icon">📅</div><div style="font-size:16px;font-weight:700">Không có lịch sử trong thời gian chọn</div></div>';
        return;
    }

    const cardHtml = itemsToRender.map(r=>{
        const ccBadge=r.cutting_category?'<span style="background:rgba(99,102,241,0.2);color:#a5b4fc;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;margin-left:6px">'+r.cutting_category+'</span>':'';
        const sharedBadge=r.multi_cut_group_id?'<span style="background:#ea580c;color:#fff;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:800;margin-left:6px;display:inline-block;vertical-align:middle;text-transform:uppercase">Cắt Chung</span>':'';

        const constCust = r.customer_name || '—';

        return '<div class="m-card" style="opacity:0.85"><div class="m-card-top">'
        +'<div class="m-card-icon">✅</div>'
        +'<div class="m-card-title" style="color:#a1a1aa">'+(r.product_name||'SP')+ccBadge+sharedBadge+sectBadge+'</div>'
        +'<div class="m-card-code">'+(r.order_code||'')+'</div></div>'
        +'<div class="m-card-body">'
        +'<div class="m-row"><span class="m-lbl">👤 Khách</span><span class="m-val" style="color:#60a5fa">'+constCust+'</span></div>'
        +'<div class="m-row"><span class="m-lbl">📦 Số Lượng Cắt</span><span class="m-val" style="color:#fdba74; font-size:14px">'+mFormatOrderQty(r.cut_quantity||r.order_quantity, r.product_name, r.cutting_category)+'</span></div>'
        +'<div class="m-row"><span class="m-lbl">📅 Ngày</span><span class="m-val">'+mFmt(r.cut_date)+'</span></div>'
        +'<button class="m-btn-claim ready" onclick="event.stopPropagation();mOpenDetail('+r.id+')" style="margin-top: 10px; padding: 8px 12px; font-size: 12px;">👁️ Xem đơn cắt</button>'
        +'</div></div>';
    }).join('');

    if (showSectionBadge) return cardHtml;
    c.innerHTML = cardHtml;
}

async function mClaim(id,itemId,phoiIndex,code){
    if(window._mBusy)return;
    // Find specific phoi row for this claim unit
    const rows=mUncut.filter(r=>r.id===id && (r.item_id||0)===(itemId||0) && r.phoi_pair_index===phoiIndex);
    const o=rows[0]||{};
    const title=(o.total_phoi>1)?o.order_code+' — Phiếu '+o.item_index+' — P'+(phoiIndex+1):o.order_code;
    const priMap={'GẤP':['🔴 GẤP','m-pri-gap'],'GỬI':['🟡 GỬI','m-pri-gui']};
    const pri=priMap[o.shipping_priority]||['🟣 CHUẨN','m-pri-chuan'];

    const isComp = !!o.cut_warning;
    const headerTitle = isComp ? 'Nhận Cắt Bù' : 'Nhận Đơn Cắt';
    const headerSub = isComp ? 'Xác nhận nhận phối cắt bù này' : 'Xác nhận nhận phối cắt này';
    const headerIcon = isComp ? '⚠️' : '✂️';
    const headerBg = isComp ? 'linear-gradient(135deg,#ea580c,#f97316)' : '';

    let h='<div class="mm-overlay" id="_mmModal" onclick="if(event.target===this)_mmClose()">';
    h+='<div class="mm-sheet">';
    h+='<div class="mm-header"><div class="mm-icon" style="'+(headerBg?'background:'+headerBg:'')+'">'+headerIcon+'</div><div><div class="mm-title">'+headerTitle+'</div><div class="mm-sub">'+headerSub+'</div></div></div>';
    h+='<div class="mm-body">';
    if(isComp){
        h+='<div style="background:rgba(234,88,12,0.15);border:1px solid rgba(234,88,12,0.3);border-radius:10px;padding:8px 12px;margin-bottom:12px;font-size:12px;font-weight:700;color:#f97316;line-height:1.4">⚠️ '+o.cut_warning+'</div>';
    }
    h+='<div class="mm-row"><span class="mm-lbl">📋 Mã phối</span><span class="mm-val" style="color:#10b981;font-size:15px">'+title+'</span></div>';
    h+='<div class="mm-row"><span class="mm-lbl">👤 Khách hàng</span><span class="mm-val">'+(o.customer_name||'—')+'</span></div>';
    const sale=o.cskh_name||o.created_by_name||'';
    if(sale) h+='<div class="mm-row"><span class="mm-lbl">💼 NV Sale</span><span class="mm-val" style="color:#60a5fa">'+sale+'</span></div>';
    h+='<div class="mm-row"><span class="mm-lbl">📅 Ngày ship</span><span class="mm-val">'+mFmt(o.expected_ship_date)+'</span></div>';
    h+='<div class="mm-row"><span class="mm-lbl">⚡ Ưu tiên</span><span class="mm-val"><span class="m-pri '+pri[1]+'">'+pri[0]+'</span></span></div>';
    if(rows.length>0){
        h+='<div class="mm-phoi"><div class="mm-phoi-title">📦 Chi tiết phối</div>';
        rows.forEach(p=>{
            const pn=(p.total_phoi>1)?('P'+p.phoi_in_item+(p.item_desc?' — '+p.item_desc:'')):(p.item_desc||o.order_code);
            h+='<div class="mm-phoi-item"><span class="pn">'+pn+'</span>';
            h+='<span class="pm">🧵 '+(p.material_name||'—')+' · 🎨 '+(p.color_name||'—')+'</span></div>';
        });
        h+='</div>';
    }
    h+='</div>';
    h+='<div class="mm-actions">';
    h+='<button class="mm-btn mm-btn-no" onclick="_mmClose()">Hủy</button>';
    const okText = isComp ? '⚠️ XÁC NHẬN CẮT BÙ' : '✂️ XÁC NHẬN';
    const okStyle = isComp ? 'background:linear-gradient(135deg,#f97316,#ea580c)' : '';
    h+='<button class="mm-btn mm-btn-ok" style="'+okStyle+'" id="_mmOk" onclick="_mmDoClaimOrder('+id+','+(itemId||'null')+','+phoiIndex+',\''+code+'\')">'+okText+'</button>';
    h+='</div></div></div>';

    document.body.insertAdjacentHTML('beforeend',h);
    requestAnimationFrame(()=>document.getElementById('_mmModal').classList.add('show'));
}

function _mmClose(){
    const m=document.getElementById('_mmModal');
    if(m){m.classList.remove('show');setTimeout(()=>m.remove(),350);}
}

async function _mmDoClaimOrder(id,itemId,phoiIndex,code){
    if(window._mBusy)return;
    window._mBusy=true;
    const btn=document.getElementById('_mmOk');
    if(btn){btn.disabled=true;btn.textContent='⏳ Đang xử lý...';}
    try{
        const body={dht_order_id:id, order_item_id:itemId, phoi_index:phoiIndex};
        const res=await mApi('/api/cutting/claim','POST',body);
        _mmClose();
        mToast('✅ Đã nhận phối đơn '+code);
        await mLoadAll();
    }catch(e){
        mToast(e.message,false);
        if(btn){btn.disabled=false;btn.textContent='✂️ XÁC NHẬN';}
    }finally{window._mBusy=false;}
}

async function mToggle(id,action){
    if(window._mSubmitBusy)return;
    let msg = '';
    if(action==='undo_cut_done'){
        msg='⚠️ CẢNH BÁO: Hoàn tác cắt xong sẽ mở khóa các cây vải và khôi phục số lượng vải về trạng thái chưa cắt. Bạn có chắc chắn muốn thực hiện?';
    } else if(action==='undo_cutting'){
        msg='Hoàn tác bắt đầu cắt? Sẽ mở khóa tất cả cây vải đã chọn.';
    } else if(action==='cancel_compensation'){
        msg='Bạn có chắc chắn muốn HỦY đơn cắt bù này không? Phiếu cắt bù này sẽ bị xóa vĩnh viễn khỏi hệ thống.';
    }
    if(msg && !confirm(msg))return;

    window._mSubmitBusy=true;
    try{
        await mApi('/api/cutting/toggle/'+id,'POST',{action});
        mToast('✅ Cập nhật');
        await mLoadAll();
    }
    catch(e){mToast(e.message||'Lỗi',false);}
    finally{window._mSubmitBusy=false;}
}

async function mOpenWashModal(recordId) {
    if (window._mBusy) return;
    window._mBusy = true;
    let rec = mMine.find(r => r.id === recordId) || mHist.find(r => r.id === recordId);
    if (!rec) {
        mToast('Không tìm thấy record', false);
        window._mBusy = false;
        return;
    }

    try {
        const updated = await mApi('/api/cutting/records/' + recordId);
        if (updated && updated.record) {
            rec = updated.record;
            let idx = mMine.findIndex(r => r.id === recordId);
            if (idx >= 0) mMine[idx] = updated.record;
            idx = mHist.findIndex(r => r.id === recordId);
            if (idx >= 0) mHist[idx] = updated.record;
        }
    } catch(e) {
        console.error('Error fetching record detail:', e);
    }

    let washItems = [];
    try {
        washItems = typeof rec.wash_items === 'string' ? JSON.parse(rec.wash_items) : (rec.wash_items || []);
    } catch(e) {}
    if (!Array.isArray(washItems)) washItems = [];

    window._mWashData = { recordId: recordId, wash_items: washItems, imgData: rec.wash_market_image || null };

    const isReported = !!rec.wash_reported;
    const title = (rec.order_code || '') + (rec.product_name ? ' - ' + rec.product_name : '');

    h += '<div class="mm-sheet" style="max-height:85vh;overflow-y:auto">';
    h += '<div class="mm-header" style="background:linear-gradient(135deg,#7c3aed,#4f46e5)"><div class="mm-icon">🫧</div><div><div class="mm-title">' + (isReported ? 'CHI TIẾT BÁO GIẶT VẢI' : 'BÁO GIẶT VẢI') + '</div><div class="mm-sub">' + (rec.order_code || '') + '</div></div></div>';
    h += '<div class="mm-body">';

    h += '<div class="mm-row"><span class="mm-lbl">📋 ID</span><span class="mm-val" style="font-weight:700">#' + rec.id + '</span></div>';
    h += '<div class="mm-row"><span class="mm-lbl">📅 Ngày giặt</span><span class="mm-val" style="color:#a5b4fc;font-weight:700">' + (isReported && rec.wash_reported_at ? (typeof vnFormat === 'function' ? vnDateStr(rec.wash_reported_at) : new Date(rec.wash_reported_at).toLocaleDateString('vi-VN')) : todayStr) + '</span></div>';
    h += '<div class="mm-row"><span class="mm-lbl">👤 Nhân viên cắt</span><span class="mm-val" style="color:#4ade80;font-weight:700">' + (isReported ? (rec.wash_reported_by_name || '—') : (mUser ? mUser.full_name : '—')) + '</span></div>';

            h += '<div style="text-align:center;padding:8px;border:1px solid rgba(255,255,255,0.08);border-radius:8px;background:rgba(255,255,255,0.02)">';
            h += '<img src="' + rec.wash_market_image + '" style="max-width:100%;max-height:200px;border-radius:6px">';
            h += '</div>';

            h += '<div style="text-align:center;padding:16px;color:#94a3b8;border:1.5px dashed rgba(255,255,255,0.15);border-radius:8px;font-size:12px;font-style:italic">📷 Không có ảnh Market được lưu</div>';

            h += '<div id="_mmWashImgPreview" style="font-size:11px;color:#a5b4fc;font-weight:600">📷 Click để chụp/chọn ảnh Market</div>';

    h += '</div></div>';

    h += '</div>'; // End of mm-body

    // Actions
    h += '<div class="mm-actions">';
    h += '<button class="mm-btn mm-btn-no" onclick="mCloseWashModal()">Hủy</button>';
    if (isReported) {
        const canUndo = (mUser && (mUser.id === rec.wash_reported_by || ['giam_doc', 'quan_ly', 'truong_phong'].includes(mUser.role)));
        if (canUndo) {

        }
    } else {
        h += '<button class="mm-btn mm-btn-ok" id="_mmWashSubmitBtn" style="background:linear-gradient(135deg,#7c3aed,#4f46e5)" onclick="mSubmitWash(' + recordId + ')">🫧 XÁC NHẬN BÁO GIẶT</button>';
    }
    h += '</div>';

    h += '</div></div>';
    document.body.insertAdjacentHTML('beforeend', h);
    requestAnimationFrame(() => document.getElementById('_mmWashModal').classList.add('show'));

    window._mBusy = false;
}

function mCloseWashModal() {
    const m = document.getElementById('_mmWashModal');
    if (m) { m.classList.remove('show'); setTimeout(() => m.remove(), 300); }
}

function mWashImgFile(e) {
    const f = e.target.files[0]; if (!f) return;
    mCompressImage(f, compressed => {
        if (!compressed) return;
        window._mWashData.imgData = compressed;
        const preview = document.getElementById('_mmWashImgArea');
        if (preview) {
            preview.innerHTML = '<img src="' + compressed + '" style="max-width:100%;max-height:150px;border-radius:6px">';
        }
    });
}

async function mSubmitWash(recordId) {
    if (window._mSubmitBusy) return;
    const cbs = document.querySelectorAll('._mmWashItemCb:checked');
    if (!cbs.length) {
        mToast('⚠️ Vui lòng chọn ít nhất 1 bộ phận cần giặt!', false);
        return;
    }
    const washItems = [];
    cbs.forEach(cb => washItems.push(cb.value));

    window._mSubmitBusy = true;
    const btn = document.getElementById('_mmWashSubmitBtn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Đang xử lý...'; }

    try {
        await mApi('/api/cutting/toggle/' + recordId, 'POST', {
            action: 'report_wash',
            wash_items: washItems,
            wash_market_image: window._mWashData.imgData
        });
        mCloseWashModal();
        mToast('✅ Báo giặt vải thành công!');
        await mLoadAll();
    } catch(e) {
        mToast(e.message || 'Lỗi', false);
        if (btn) { btn.disabled = false; btn.textContent = '🫧 XÁC NHẬN BÁO GIẶT'; }
    } finally {
        window._mSubmitBusy = false;
    }
}

async function mUndoWash(recordId) {
    if (!confirm('Bạn có chắc chắn muốn hủy trạng thái báo giặt vải của đơn này không?')) return;
    if (window._mSubmitBusy) return;
    window._mSubmitBusy = true;
    try {
        await mApi('/api/cutting/toggle/' + recordId, 'POST', { action: 'undo_wash' });
        mCloseWashModal();
        mToast('✅ Đã hủy báo giặt vải!');
        await mLoadAll();
    } catch(e) {
        mToast(e.message || 'Lỗi', false);
    } finally {
        window._mSubmitBusy = false;
    }
}

function mDataURLtoBlob(dataurl) {
    var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
        bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
    while(n--){
        u8arr[n] = bstr.charCodeAt(n);
    }
    return new Blob([u8arr], {type:mime});
}

async function mSubmitError(recordId) {
    if (window._mSubmitBusy) return;

    const qtyEl = document.getElementById('mmE_qty');
    const qty = Number(qtyEl.value) || 0;
    if (qty <= 0) { mToast('⚠️ Vui lòng nhập số lượng lỗi hợp lệ!', false); return; }

    const contentEl = document.getElementById('mmE_content');
    const content = contentEl.value.trim();
    if (!content) { mToast('⚠️ Vui lòng nhập chi tiết nội dung lỗi!', false); return; }

    if (!window._mmErrorImages || window._mmErrorImages.length === 0) {
        mToast('⚠️ Vui lòng chọn hoặc chụp ít nhất 1 hình ảnh minh họa bắt buộc!', false);
        return;
    }

    window._mSubmitBusy = true;
    const btn = document.getElementById('_mmErrorSubmitBtn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Đang gửi...'; }

    try {
        const updated = await mApi('/api/cutting/records/' + recordId);
        if (!updated || !updated.record) throw new Error('Không tìm thấy record gốc');
        const origRecord = updated.record;

        let today = new Date().toISOString().split('T')[0];
        if (typeof vnNow === 'function') {
            const n = vnNow();
            today = n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0');
        }

        const cutterName = mUser ? mUser.full_name : 'Thợ cắt';
        const reporterName = 'Người Báo Lỗi: Bộ Phận Cắt - ' + cutterName;

        const body = {
            report_date: today,
            common_error_type: document.getElementById('mmE_common') ? document.getElementById('mmE_common').value : '',
            order_code: origRecord.order_code,
            cskh_name: reporterName,
            error_quantity: qty,
            error_content: content,
            dht_order_id: origRecord.dht_order_id,
            customer_name: origRecord.customer_name,
            production_quantity: origRecord.order_quantity,
            error_department: null,
            error_type: 'Nội Bộ'
        };

        const result = await mApi('/api/customer-errors', 'POST', body);
        if (result.error) throw new Error(result.error);

        if (window._mmErrorImages && window._mmErrorImages.length > 0 && result.id) {
            const fd = new FormData();
            window._mmErrorImages.forEach(function(imgData, index) {
                var blob = mDataURLtoBlob(imgData);
                fd.append('file_' + index, blob, 'image_' + index + '.jpeg');
            });
            await fetch('/api/customer-errors/' + result.id + '/images', { method: 'POST', body: fd });
        }

        const videoInput = document.getElementById('mmE_video');
        if (videoInput && videoInput.files.length > 0 && result.id) {

            fdv.append('video', videoInput.files[0]);

        mToast('✅ Đã báo đơn lỗi thành công!', true);
        mCloseErrorModal();
        await mLoadAll();
    } catch(e) {
        mToast('Lỗi: ' + e.message, false);
        if (btn) { btn.disabled = false; btn.textContent = '🚨 BÁO LỖI'; }
    } finally {
        window._mSubmitBusy = false;
    }
}

function mCompressImage(file, callback) {
    if (!file) return callback(null);
    var reader = new FileReader();
    reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
            var canvas = document.createElement('canvas');
            var maxWidth = 800;
            var maxHeight = 800;
            var width = img.width;
            var height = img.height;

            if (width > height) {
                if (width > maxWidth) {
                    height = Math.round((height * maxWidth) / width);
                    width = maxWidth;
                }
            } else {
                if (height > maxHeight) {
                    width = Math.round((width * maxHeight) / height);
                    height = maxHeight;
                }
            }

            canvas.width = width;
            canvas.height = height;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            var compressed = canvas.toDataURL('image/jpeg', 0.7);
            callback(compressed);
        };
        img.onerror = function() {
            callback(e.target.result);
        };
        img.src = e.target.result;
    };
    reader.onerror = function() {
        callback(null);
    };
    reader.readAsDataURL(file);
}

    cb.checked = isNowChecked;
    
    var card = btn.closest('div[style*="display:flex;align-items:center"]');
    
    if (isNowChecked) {
        btn.innerHTML = '✅ Đã Xem và Làm';

        btn.style.background = 'rgba(34,197,94,0.1)';

        btn.innerHTML = '👉 Đã Xem và Làm';

function mUpdateCutConfirmState() {
    const confirmBtn = document.getElementById('_mmCutOk');
    if (!confirmBtn) return;
    
    const selectedRolls = document.querySelectorAll('._mRollCb:checked').length;
    const totalReminders = document.querySelectorAll('.m-reminder-cb').length;
    const checkedReminders = document.querySelectorAll('.m-reminder-cb:checked').length;
    const allRemindersChecked = (checkedReminders === totalReminders);
    
    const isValid = (selectedRolls > 0) && allRemindersChecked;
    
    confirmBtn.disabled = !isValid;
    if (isValid) {
        confirmBtn.style.opacity = '1';
        confirmBtn.style.cursor = 'pointer';
    } else {
        confirmBtn.style.opacity = '0.5';
        confirmBtn.style.cursor = 'not-allowed';
    }
}

function mRecalcKg(){
    const cbs=document.querySelectorAll('._mRollCb:checked');
    let t=0;cbs.forEach(cb=>{t+=parseFloat(cb.dataset.weight)||0;});
    const el=document.getElementById('_mKgDisp');
    if(el) el.textContent=mFmtKg(t)+' kg';
    mUpdateCutConfirmState();
}

async function mDoCut(recordId){
    if(window._mSubmitBusy)return;
    window._mSubmitBusy=true;
    const cbs=document.querySelectorAll('._mRollCb:checked');
    if(!cbs.length){mToast('Chọn ít nhất 1 cây vải',false);window._mSubmitBusy=false;return;}
    
    // Check reminders again for safety
    const totalReminders = document.querySelectorAll('.m-reminder-cb').length;
    const checkedReminders = document.querySelectorAll('.m-reminder-cb:checked').length;
    if (checkedReminders < totalReminders) {
        mToast('Vui lòng xác nhận đã xem và làm tất cả nhắc nhở!', false);
        window._mSubmitBusy = false;
        return;
    }
    
    const ids=[];cbs.forEach(cb=>ids.push(Number(cb.value)));
    const btn=document.getElementById('_mmCutOk');
    if(btn){btn.disabled=true;btn.textContent='⏳...';}
    try{
        // First submit reminders viewed status
        if (totalReminders > 0) {
            const reminderIds = [];
            document.querySelectorAll('.m-reminder-cb:checked').forEach(cb => {
                reminderIds.push(Number(cb.dataset.reminderId));
            });
            await mApi('/api/qlx/reminders/viewed', 'POST', {
                reminder_ids: reminderIds,
                record_type: 'cutting',
                record_id: recordId
            });
        }
        
        await mApi('/api/cutting/toggle/'+recordId,'POST',{action:'start_cutting',selected_roll_ids:ids});
        mCloseCutModal();
        mToast('✅ Đã bắt đầu cắt — '+ids.length+' cây');
        await mLoadAll();
    }catch(e){
        mToast(e.message||'Lỗi',false);
        if(btn){btn.disabled=false;btn.textContent='✂️ XÁC NHẬN CẮT';}
        mUpdateCutConfirmState();
    }finally{
        window._mSubmitBusy=false;
    }
}

            h += '  <div style="display:flex;flex-direction:column;gap:8px">';

                h += '    <div style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border:1.5px solid ' + (isViewed ? '#10b981' : '#ef4444') + ';border-radius:10px;padding:10px 12px;text-align:left;">';

        h+='</div>';

        if (r.has_ratio_image) {
            mApi('/api/cutting/records/' + recordId + '/image').then(imgRes => {

            }).catch(err => {

                if (placeholder) placeholder.textContent = '❌ Lỗi tải ảnh';
            });
        }
    } catch(e) {
        console.error('[BPC] Load detail error:', e);
        mToast('Không thể tải chi tiết đơn cắt', false);
    } finally {
        window._mDetailBusy = false;
    }
}

    if(window._mBusy)return;
    window._mBusy=true;

function mDoneToggleRoll(idx){
    window._mDoneData._allCut=false;
    const btn=document.getElementById('_mDoneAllCutBtn');
    if(btn){btn.style.background='#ef4444';btn.textContent='🔴 Cắt hết tất cả';}
    const rl=document.getElementById('_mDoneRollsList');if(rl)rl.style.display='';
    const cb=document.querySelector('._mDoneRollCb[data-idx="'+idx+'"]');
    const inp=document.getElementById('_mDoneRollInp_'+idx);
    if(cb&&inp){inp.style.display=cb.checked?'block':'none';if(!cb.checked){const k=document.getElementById('_mDoneRollKg_'+idx);if(k)k.value='';}}
    mDoneRecalc();
}
function mDoneAllCut(){
    const d=window._mDoneData;if(!d)return;
    if(d._allCut){
        d._allCut=false;
        const btn=document.getElementById('_mDoneAllCutBtn');
        if(btn){btn.style.background='#ef4444';btn.textContent='🔴 Cắt hết tất cả';}
        const rl=document.getElementById('_mDoneRollsList');if(rl)rl.style.display='';
        mDoneRecalc();
        return;
    }
    d._allCut=true;
    document.querySelectorAll('._mDoneRollCb').forEach(cb=>{cb.checked=false;const i=cb.dataset.idx;const inp=document.getElementById('_mDoneRollInp_'+i);if(inp)inp.style.display='none';const k=document.getElementById('_mDoneRollKg_'+i);if(k)k.value='';});
    const btn=document.getElementById('_mDoneAllCutBtn');
    if(btn){btn.style.background='#059669';btn.textContent='Đã Cắt Hết Tất Cả';}
    const rl=document.getElementById('_mDoneRollsList');if(rl)rl.style.display='none';
    mDoneRecalc();
}
function mDoneRecalc(){
    const d=window._mDoneData;if(!d)return;
    let kgR=0;document.querySelectorAll('._mDoneRollCb:checked').forEach(cb=>{const k=document.getElementById('_mDoneRollKg_'+cb.dataset.idx);kgR+=k?(parseFloat(k.value)||0):0;});
    const kgCut=d.kgStart-kgR;const el=document.getElementById('_mDoneKgCut');if(el)el.textContent=mFmtKg(kgCut);
    const qty=parseFloat(document.getElementById('_mDoneQty').value)||0;
    
    // Show/hide compensation area based on qty
    const cmpEl=document.getElementById('_mDoneCompensateArea');
    if (cmpEl) {
        if (qty < d.orderQty) {
            cmpEl.style.display = 'block';
        } else {
            cmpEl.style.display = 'none';
        }
    }

    const ratio=kgCut>0?Math.round((qty/kgCut)*100)/100:0;
    const re=document.getElementById('_mDoneRatio');if(re){re.textContent=ratio?ratio.toFixed(2)+' sp/'+d.unit:'—';if(d.targetRatio > 0){re.style.color=ratio>=d.targetRatio?'#10b981':'#ef4444';}else{re.style.color='#60a5fa';}}
    
    // Toggle warning for target ratio
    const warn = document.getElementById('_mDoneRatioWarn');
    if (warn) {
        if (d.targetRatio > 0 && ratio < d.targetRatio) {
            warn.style.display = 'block';
        } else {
            warn.style.display = 'none';
        }
    }
}

function mCloseDoneModal(){

async function mSubmitDone(recordId){
    if(window._mSubmitBusy)return;
    window._mSubmitBusy=true;
    const d=window._mDoneData;if(!d){window._mSubmitBusy=false;return;}
    const qtyInput=document.getElementById('_mDoneQty');
    const qty=parseInt(qtyInput.value);
    if(!qty||qty<=0){
        mToast('Nhập Số Lượng Cắt',false);
        mHighlight(qtyInput);
        window._mSubmitBusy=false;
        return;
    }
    if(d.orderQty&&qty>d.orderQty){
        mToast('Số Lượng Cắt > Số Lượng Sản Phẩm',false);
        mHighlight(qtyInput);
        window._mSubmitBusy=false;
        return;
    }
    // Validate: must select rolls or click "Cắt hết"
    const hasCheckedRoll=document.querySelectorAll('._mDoneRollCb:checked').length>0;
    if(!hasCheckedRoll && !d._allCut){
        mToast('Chọn cây còn lại hoặc ấn "Cắt hết"',false);
        const allCutBtn=document.querySelector('button[onclick="mDoneAllCut()"]');
        mHighlight(allCutBtn);
        window._mSubmitBusy=false;
        return;
    }
    const rollRemains=[];let err=false;
    document.querySelectorAll('._mDoneRollCb').forEach(cb=>{
        if(cb.checked){
            const k=document.getElementById('_mDoneRollKg_'+cb.dataset.idx);
            const v=k?parseFloat(k.value):0;
            const mx=parseFloat(cb.dataset.weight)||0;
            if(!v||v<=0){
                err=true;
                mHighlight(k);
            }
            if(v>mx){
                err=true;
                mToast('Kg > '+mx,false);
                mHighlight(k);
            }
            rollRemains.push({roll_id:Number(cb.dataset.rollid),remaining_weight:v});
        }
    });
    if(err){mToast('Kiểm tra kg còn lại',false);window._mSubmitBusy=false;return;}

    // Check ratio and target ratio validation
    let kgR=0;
    rollRemains.forEach(r => { kgR += r.remaining_weight || 0; });
    const kgCut = d.kgStart - kgR;
    const ratio = kgCut > 0 ? Math.round((qty / kgCut) * 100) / 100 : 0;

    if (d.targetRatio > 0 && ratio < d.targetRatio) {
        const reason = document.getElementById('_mDoneReason');
        if (!reason || !reason.value.trim() || reason.value.trim().length < 2) {
            mToast('⚠️ Tỉ lệ cắt thấp hơn định lượng (' + d.targetRatio + '). Vui lòng nhập lý do!', false);
            if (reason) mHighlight(reason);
            window._mSubmitBusy = false;
            return;
        }
        if (!d.imgData) {
            mToast('⚠️ Tỉ lệ cắt thấp hơn định lượng (' + d.targetRatio + '). Vui lòng chụp/chọn ảnh minh chứng!', false);
            window._mSubmitBusy = false;
            return;
        }
    }

    const uc=d.rolls.length-rollRemains.length;
    const needCompSelect = document.getElementById('_mDoneCompensateSelect');
    const needCompensate = needCompSelect ? (needCompSelect.value === 'true') : false;

    const proceed=async()=>{
        const body={action:'cut_done',cut_quantity:qty,roll_remains:rollRemains,need_compensate:needCompensate};
        if (d.targetRatio > 0 && ratio < d.targetRatio) {
            const reason = document.getElementById('_mDoneReason');
            body.ratio_reason = reason.value.trim();
            body.ratio_image = d.imgData;
        }
        const btn=document.getElementById('_mDoneOk');if(btn){btn.disabled=true;btn.textContent='⏳...';}
        try{
            await mApi('/api/cutting/toggle/'+recordId,'POST',body);
            mCloseDoneModal();
            mToast('✅ Cắt xong!');
            await mLoadAll();
        }
        catch(e){
            mToast(e.message||'Lỗi',false);
            if(btn){btn.disabled=false;btn.textContent='🏁 XÁC NHẬN';}
        }finally{
            window._mSubmitBusy=false;
        }
    };
    if(uc>0){
        mConfirm(uc+' cây sẽ cắt hết (0kg).\nBạn có chắc chắn?',proceed,()=>{window._mSubmitBusy=false;});
    }else{
        proceed();
    }
}

function mGDoneRecalc(){
    const d=window._mGDone;if(!d)return;
    let kgR=0;document.querySelectorAll('._mGRollCb:checked').forEach(cb=>{const k=document.getElementById('_mGRollKg_'+cb.dataset.idx);kgR+=k?(parseFloat(k.value)||0):0;});
    const totalKgCut=d.kgStart-kgR;
    const el=document.getElementById('_mGKgCut');if(el)el.textContent=mFmtKg(totalKgCut);
    // Calculate distribution
    let totalQty=0;const qtys=[];
    d.records.forEach(r=>{
        const inp=document.getElementById('_mGQ_'+r.id);
        const q=inp?parseInt(inp.value)||0:0;
        
        // Show/hide group compensation area
        const max=r.order_quantity||0;
        const comp=document.getElementById('_mGroupCompensate_'+r.id);
        if(comp && inp){
            if(q<max && !inp.readOnly){
                comp.style.display='block';
            }else{
                comp.style.display='none';
            }
        }
        
        qtys.push({id:r.id,qty:q,name:r.product_name||r.order_code});
        totalQty+=q;
    });
    let dh='';
    let combinedRatio=0;
    if(totalKgCut>0){
        combinedRatio=Math.round((totalQty/totalKgCut)*100)/100;
        let rc='#60a5fa';
        if(d.targetRatio > 0){
            rc=combinedRatio>=d.targetRatio?'#10b981':'#ef4444';
        }
        dh+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(16,185,129,0.1);border:1.5px solid rgba(16,185,129,0.25);border-radius:10px">';
        dh+='<span style="font-size:12px;font-weight:800;color:#e2e8f0">📊 TỈ LỆ CHUNG</span>';
        dh+='<span style="font-size:11px;color:#94a3b8">'+totalQty+' sp / '+mFmtKg(totalKgCut)+' '+d.unit+'</span>';
        dh+='<span style="font-size:20px;font-weight:900;color:'+rc+'">'+combinedRatio.toFixed(2)+' sp/'+d.unit+'</span></div>';
        dh+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 12px;margin-top:6px;"><span style="font-size:12px;font-weight:800;color:#e2e8f0">⚖️ Định Lượng Cắt Yêu Cầu</span><span style="font-size:15px;font-weight:700;color:#fbbf24">' + (d.targetRatio || 0) + ' sp/' + d.unit + '</span></div>';
    }
    const dp=document.getElementById('_mGDistrib');if(dp)dp.innerHTML=dh;

    // Toggle warning for target ratio in group
    const warn = document.getElementById('_mGDoneRatioWarn');
    if (warn) {
        if (d.targetRatio > 0 && combinedRatio < d.targetRatio) {
            warn.style.display = 'block';
        } else {
            warn.style.display = 'none';
        }
    }
}
async function mSubmitGDone(){
    if(window._mSubmitBusy)return;
    window._mSubmitBusy=true;
    const d=window._mGDone;if(!d){window._mSubmitBusy=false;return;}
    // Validate quantities
    const items=[];
    for(const r of d.records){
        const inp=document.getElementById('_mGQ_'+r.id);
        const qty=inp?parseInt(inp.value):0;
        if(!qty||qty<=0){
            mToast('Nhập SL Cắt cho tất cả đơn',false);
            mHighlight(inp);
            window._mSubmitBusy=false;
            return;
        }
        if(r.order_quantity&&qty>Number(r.order_quantity)){
            mToast('SL Cắt > SL Đơn cho '+(r.product_name||r.id),false);
            mHighlight(inp);
            window._mSubmitBusy=false;
            return;
        }
        const compSelect = document.getElementById('_mGroupCompSelect_'+r.id);
        const needCompensate = compSelect ? (compSelect.value === 'true') : false;
        items.push({record_id:r.id,cut_quantity:qty,need_compensate:needCompensate});
    }
    // Validate rolls
    const hasChecked=document.querySelectorAll('._mGRollCb:checked').length>0;
    if(!hasChecked&&!d._allCut){
        mToast('Chọn cây còn lại hoặc ấn "Cắt hết"',false);
        const allCutBtn=document.getElementById('_mGCutAllBtn');
        mHighlight(allCutBtn);
        window._mSubmitBusy=false;
        return;
    }
    const rollRemains=[];let err=false;
    document.querySelectorAll('._mGRollCb').forEach(cb=>{
        if(cb.checked){
            const k=document.getElementById('_mGRollKg_'+cb.dataset.idx);
            const v=k?parseFloat(k.value):0;
            const mx=parseFloat(cb.dataset.weight)||0;
            if(!v||v<=0){
                err=true;
                mHighlight(k);
            }
            if(v>mx){
                err=true;
                mToast('Kg > '+mx,false);
                mHighlight(k);
            }
            rollRemains.push({roll_id:Number(cb.dataset.rollid),remaining_weight:v});
        }
    });
    if(err){mToast('Kiểm tra kg còn lại',false);window._mSubmitBusy=false;return;}

    // Check target ratio validation for group cutting
    let kgR=0;
    rollRemains.forEach(r => { kgR += r.remaining_weight || 0; });
    const totalKgCut = d.kgStart - kgR;
    let totalQty = 0;
    items.forEach(it => { totalQty += it.cut_quantity || 0; });
    const combinedRatio = totalKgCut > 0 ? Math.round((totalQty / totalKgCut) * 100) / 100 : 0;

    if (d.targetRatio > 0 && combinedRatio < d.targetRatio) {
        const reason = document.getElementById('_mGDoneReason');
        if (!reason || !reason.value.trim() || reason.value.trim().length < 2) {
            mToast('⚠️ Tỉ lệ cắt thấp hơn định lượng (' + d.targetRatio + '). Vui lòng nhập lý do!', false);
            if (reason) mHighlight(reason);
            window._mSubmitBusy = false;
            return;
        }
        if (!d.imgData) {
            mToast('⚠️ Tỉ lệ cắt thấp hơn định lượng (' + d.targetRatio + '). Vui lòng chụp/chọn ảnh minh chứng!', false);
            window._mSubmitBusy = false;
            return;
        }
    }

    const uc=d.rolls.length-rollRemains.length;
    const proceed=async()=>{
        const body={group_id:d.groupId,items,roll_remains:rollRemains};
        if (d.targetRatio > 0 && combinedRatio < d.targetRatio) {
            const reason = document.getElementById('_mGDoneReason');
            body.ratio_reason = reason.value.trim();
            body.ratio_image = d.imgData;
        }
        const btn=document.getElementById('_mGDoneOk');if(btn){btn.disabled=true;btn.textContent='⏳...';}
        try{
            await mApi('/api/cutting/multi-cut/done','POST',body);
            mCloseGDone();mToast('✅ Cắt xong nhóm '+items.length+' đơn!');await mLoadAll();
        }catch(e){
            mToast(e.message||'Lỗi',false);
            if(btn){btn.disabled=false;btn.textContent='🏁 XÁC NHẬN CẮT XONG';}
        }finally{
            window._mSubmitBusy=false;
        }
    };
    if(uc>0){
        mConfirm(uc+' cây sẽ cắt hết (0kg).\nBạn có chắc chắn?',proceed,()=>{window._mSubmitBusy=false;});
    }else{
        proceed();
    }
}

function mToggleMultiReminder(btn) {
    const remId = Number(btn.getAttribute('data-reminder-id'));
    const orderItemId = Number(btn.getAttribute('data-order-item-id'));
    const cb = document.querySelector('.m-multi-reminder-cb[data-order-item-id="' + orderItemId + '"][data-reminder-id="' + remId + '"]');
    if (!cb) return;
    
    const isNowChecked = !cb.checked;
    cb.checked = isNowChecked;
    
    const card = btn.closest('div[style*="display:flex;align-items:center"]');
    
    if (isNowChecked) {
        btn.innerHTML = '✅ Đã Xem và Làm';
        btn.style.border = '1.5px solid #22c55e';
        btn.style.background = 'rgba(34,197,94,0.1)';
        btn.style.color = '#4ade80';
        btn.style.animation = 'none';
        if (card) card.style.borderColor = '#22c55e';
    } else {
        btn.innerHTML = '👉 Đã Xem và Làm';
        btn.style.border = '1.5px solid #ef4444';
        btn.style.background = 'rgba(239,68,68,0.1)';
        btn.style.color = '#fca5a5';
        btn.style.animation = 'bpcReminderPulseMobile 2s infinite';
        if (card) card.style.borderColor = '#ef4444';
    }
    mUpdateMultiCutConfirmState();
}

function mUpdateMultiCutConfirmState() {
    const confirmBtn = document.getElementById('_mmMCNext');
    if (!confirmBtn) return;
    if (_mm.step !== 4) return;
    
    const totalReminders = document.querySelectorAll('.m-multi-reminder-cb').length;
    const checkedReminders = document.querySelectorAll('.m-multi-reminder-cb:checked').length;
    const allRemindersChecked = (checkedReminders === totalReminders);
    
    confirmBtn.disabled = !allRemindersChecked;
    if (allRemindersChecked) {
        confirmBtn.style.opacity = '1';
        confirmBtn.style.cursor = 'pointer';
    } else {
        confirmBtn.style.opacity = '0.5';
        confirmBtn.style.cursor = 'not-allowed';
    }
}

async function mMCNext(){
    if(_mm.step===1){
        if(!_mm.selMat||!_mm.selColor){mToast('Chọn chất liệu và màu',false);return;}
        try{
            var r1=await mApi('/api/cutting/available-rolls?material_name='+encodeURIComponent(_mm.selMat)+'&color_name='+encodeURIComponent(_mm.selColor));
            _mm.rolls=r1.rolls||[];
            var r2=await mApi('/api/cutting/multi-cut/candidates?material_name='+encodeURIComponent(_mm.selMat)+'&fabric_color='+encodeURIComponent(_mm.selColor));
            _mm.candidates=r2.candidates||[];
        }catch(e){mToast(e.message,false);return;}
        _mm.step=2;mMCRender();
    }else if(_mm.step===2){
        if(!_mm.selRolls.length){mToast('Chọn ít nhất 1 cây',false);return;}
        _mm.step=3;mMCRender();
    }else if(_mm.step===3){
        if(_mm.selOrders.length<2){mToast('Chọn ít nhất 2 đơn',false);return;}
        
        // Fetch reminders for all selected orders
        const nextBtn = document.getElementById('_mmMCNext');
        if (nextBtn) { nextBtn.disabled = true; nextBtn.textContent = '⏳ Tải nhắc nhở...'; }
        try {
            const remPromises = _mm.selOrders.map(itemId => {
                const cand = _mm.candidates.find(c => c.order_item_id === itemId);
                if (!cand) return null;
                let url = '/api/qlx/reminders?order_id=' + cand.dht_order_id + '&dept=cat&item_id=' + itemId;
                return mApi(url).then(res => ({
                    order_code: cand.order_code,
                    description: cand.description,
                    dht_order_id: cand.dht_order_id,
                    order_item_id: itemId,
                    reminders: res.reminders || [],
                    reminder_ids: res.reminder_ids || [],
                    viewed_ids: res.viewed_ids || []
                }));
            }).filter(Boolean);
            
            const remResults = await Promise.all(remPromises);
            _mm.orderReminders = remResults.filter(r => r.reminders.length > 0);
            _mm.step = 4;
            mMCRender();
        } catch(e) {
            mToast('Lỗi tải nhắc nhở: ' + e.message, false);
        } finally {
            if (nextBtn) { nextBtn.disabled = false; nextBtn.textContent = 'Tiếp ▶'; }
        }
    }else if(_mm.step===4){
        // Safety check reminders
        const totalReminders = document.querySelectorAll('.m-multi-reminder-cb').length;
        const checkedReminders = document.querySelectorAll('.m-multi-reminder-cb:checked').length;
        if (checkedReminders < totalReminders) {
            mToast('Vui lòng xác nhận đã xem và làm tất cả nhắc nhở!', false);
            return;
        }

        var btn=document.getElementById('_mmMCNext');if(btn){btn.disabled=true;btn.textContent='⏳...';}
        try{
            // First submit viewed status for all reminders of all combined orders!
            if (totalReminders > 0) {
                const reminderIds = [];
                document.querySelectorAll('.m-multi-reminder-cb:checked').forEach(cb => {
                    reminderIds.push(Number(cb.dataset.reminderId));
                });
                await mApi('/api/qlx/reminders/viewed', 'POST', {
                    reminder_ids: reminderIds,
                    record_type: 'cutting'
                });
            }

            await mApi('/api/cutting/multi-cut','POST',{selected_roll_ids:_mm.selRolls,selected_order_item_ids:_mm.selOrders,material_name:_mm.selMat,fabric_color:_mm.selColor});
            mCloseMC();mToast('✅ Đã cắt chung '+_mm.selOrders.length+' đơn!');await mLoadAll();
        }catch(e){mToast(e.message||'Lỗi',false);if(btn){btn.disabled=false;btn.textContent='✂️ XÁC NHẬN';mUpdateMultiCutConfirmState();}}
    }
}

function mCompressImage(file, callback) {
    if (!file) return callback(null);
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const maxWidth = 1000;
            const maxHeight = 1000;
            let width = img.width;
            let height = img.height;

            if (width > height) {
                if (width > maxWidth) {
                    height = Math.round((height * maxWidth) / width);
                    width = maxWidth;
                }
            } else {
                if (height > maxHeight) {
                    width = Math.round((width * maxHeight) / height);
                    height = maxHeight;
                }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            const compressed = canvas.toDataURL('image/jpeg', 0.7);
            callback(compressed);
        };
        img.onerror = function() {
            callback(e.target.result);
        };
        img.src = e.target.result;
    };
    reader.onerror = function() {
        callback(null);
    };
    reader.readAsDataURL(file);
}

async function mRemoveRoll(recordId, rollId) {
    if (!confirm('Bạn có chắc chắn muốn xóa cây vải này ra khỏi đơn cắt?')) return;
    try {
        const res = await mApi('/api/cutting/records/' + recordId + '/remove-roll', 'POST', { roll_id: rollId });

        if (window._mDoneData && window._mDoneData.recordId === recordId) {
            window._mDoneData.rolls = res.selected_roll_ids;
            window._mDoneData.kgStart = Number(res.kg_start) || 0;
        }
        const rec = mMine.find(x => x.id === recordId);
        if (rec) {
            rec.selected_roll_ids = res.selected_roll_ids;
            rec.kg_start = res.kg_start;
        }
        mCloseDoneModal();
        mOpenDoneModal(recordId);
    } catch (e) {

    }
}
