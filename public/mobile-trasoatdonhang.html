<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tra Soát Đơn Hàng — Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,system-ui,sans-serif;background:#f1f5f9;color:#1e293b;-webkit-tap-highlight-color:transparent}
.header{background:linear-gradient(135deg,#1e1b4b,#312e81);color:white;padding:16px 16px 20px;position:sticky;top:0;z-index:10}
.header h1{font-size:17px;font-weight:900;margin-bottom:12px}
.search-box{position:relative}
.search-box input{width:100%;padding:12px 16px 12px 40px;border:none;border-radius:12px;font-size:15px;font-weight:600;background:rgba(255,255,255,.15);color:white;outline:none}
.search-box input::placeholder{color:rgba(255,255,255,.6)}
.search-box .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px}
.filters{display:flex;gap:8px;margin-top:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.filters select{padding:8px 12px;border:1px solid rgba(255,255,255,.25);border-radius:10px;background:rgba(255,255,255,.1);color:white;font-size:12px;font-weight:700;-webkit-appearance:none;min-width:90px}
.filters select option{color:#1e1b4b;background:white}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px 0}
.pipeline-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 16px 0}
.pipeline-cards .stat-card:nth-child(5) {grid-column: 1 / -1}
.stat-card{background:white;border-radius:12px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1.5px solid transparent;transition:all .2s;cursor:pointer}
.stat-card:active{transform:scale(0.97)}
.stat-card.active{border-color:#4f46e5 !important;transform:scale(1.02);box-shadow:0 6px 12px rgba(79,70,229,0.15)}
.stat-card .num{font-size:24px;font-weight:900}
.stat-card .lbl{font-size:10px;font-weight:700;color:#64748b;margin-top:2px}
.stat-card .pct{font-size:11px;font-weight:800;margin-top:1px}
.results{padding:8px 16px 80px}
.results-count{font-size:12px;font-weight:700;color:#64748b;margin:12px 0 8px}
.order-card{background:white;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.04);border:1px solid #e5e7eb;transition:all .2s}
.order-card.expanded{border-color:#6366f1;box-shadow:0 4px 20px rgba(99,102,241,.12)}
.oc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.oc-code{font-size:15px;font-weight:900;color:#4338ca}
.oc-badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:9px;font-weight:800;margin-left:4px}
.oc-badge-repair{background:#fef3c7;color:#92400e}
.oc-badge-pet{background:#ede9fe;color:#5b21b6}
.oc-prio{display:inline-block;padding:2px 6px;border-radius:50px;font-size:9px;font-weight:900;text-align:center;animation:ocPrioBlink 1.5s infinite ease-in-out;margin-left:4px;vertical-align:middle}
.oc-prio-gap{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}
.oc-prio-gui{background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd}
.oc-prio-chuan{background:#f3e8ff;color:#7e22ce;border:1px solid #d8b4fe}
@keyframes ocPrioBlink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.96)}}
.oc-status{font-size:11px;font-weight:800;padding:3px 10px;border-radius:8px;white-space:nowrap}
.oc-status.early{background:#d1fae5;color:#065f46}
.oc-status.on_time{background:#e0e7ff;color:#3730a3}
.oc-status.late{background:#fee2e2;color:#991b1b}
.oc-status.pending{background:#f3f4f6;color:#374151}
.oc-customer{font-size:13px;font-weight:600;margin-top:6px}
.oc-phone{font-size:12px;color:#6b7280;font-family:monospace}
.oc-progress{margin-top:10px}
.oc-pbar{height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden}
.oc-pbar-fill{height:100%;border-radius:4px;transition:width .4s}
.oc-pinfo{display:flex;justify-content:space-between;margin-top:4px;font-size:11px;font-weight:700}
.oc-date{font-size:11px;color:#64748b;margin-top:6px}
.oc-expand-btn{width:100%;padding:8px;margin-top:10px;border:1.5px dashed #d1d5db;border-radius:10px;background:transparent;color:#6366f1;font-size:12px;font-weight:800;cursor:pointer}
.timeline-detail{margin-top:14px;animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.tl-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9;align-items:flex-start}
.tl-step:last-child{border-bottom:none}
.tl-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;border:2.5px solid #e5e7eb}
.tl-icon.done{background:#10b981;border-color:#10b981;color:white}
.tl-icon.active{background:#f59e0b;border-color:#f59e0b;color:white}
.tl-icon.pending{background:#f8fafc;color:#9ca3af}
.tl-info{flex:1}
.tl-name{font-size:13px;font-weight:800;color:#1e293b}
.tl-time{font-size:11px;color:#6b7280;margin-top:1px}
.tl-worker{font-size:11px;color:#4338ca;font-weight:600}
.ship-info{background:#f8fafc;border-radius:10px;padding:12px;margin-top:12px}
.ship-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.ship-row b{color:#1e1b4b}
.load-more{display:block;width:100%;padding:14px;margin:8px 0;border:none;border-radius:12px;background:#4338ca;color:white;font-size:14px;font-weight:800;cursor:pointer}
.load-more:disabled{opacity:.4}
.empty{text-align:center;padding:60px 20px;color:#9ca3af}
.empty .icon{font-size:48px;margin-bottom:8px}
@keyframes tsFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>
<body>
<div class="header">
    <h1>🔍 Tra Soát Đơn Hàng</h1>
    <div style="display:flex;gap:8px;align-items:center">
        <div class="search-box" style="flex:1">
            <span class="icon">🔎</span>
            <input id="mSearch" placeholder="Mã đơn, SĐT, tên KH..." autocomplete="off">
        </div>
        <button onclick="mScanQR()" style="background: rgba(255,255,255,.15); border: none; border-radius: 12px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 18px; flex-shrink: 0;" title="Quét mã QR">
            📷
        </button>
    </div>
    <div class="filters">
        <select id="mMonth"><option value="">Tất cả tháng</option></select>
        <select id="mYear"></select>
        <select id="mStatus"><option value="">Tất cả</option><option value="early">🟢 Sớm</option><option value="on_time">🟡 Đúng</option><option value="late">🔴 Trễ</option></select>
    </div>
</div>
<div class="cards" id="mCards"></div>
<div class="pipeline-cards" id="mPipelineCards"></div>
<div class="results" id="mResults"><div class="empty"><div class="icon">⏳</div>Đang tải...</div></div>

<script>
const API_BASE = '';
var _m = { page: 1, search: '', orders: [], total: 0, current_step: '', expandedId: null, debounce: null };

async function api(url) {
    const r = await fetch(API_BASE + url, { credentials: 'include' });
    if (!r.ok) throw new Error('API error');
    return r.json();
}

function init() {
    const now = new Date(), cm = now.getMonth()+1, cy = now.getFullYear();
    const mSel = document.getElementById('mMonth'), ySel = document.getElementById('mYear');
    const q1 = document.createElement('option'); q1.value = 'Q1'; q1.text = 'Quý 1 (T1-3)'; mSel.appendChild(q1);
    const q2 = document.createElement('option'); q2.value = 'Q2'; q2.text = 'Quý 2 (T4-6)'; mSel.appendChild(q2);
    const q3 = document.createElement('option'); q3.value = 'Q3'; q3.text = 'Quý 3 (T7-9)'; mSel.appendChild(q3);
    const q4 = document.createElement('option'); q4.value = 'Q4'; q4.text = 'Quý 4 (T10-12)'; mSel.appendChild(q4);
    for (let m=1;m<=12;m++) { const o=document.createElement('option'); o.value=m; o.text='Tháng '+m; if(m===cm)o.selected=true; mSel.appendChild(o); }
    
    const oAll = document.createElement('option'); oAll.value = ''; oAll.text = 'Tất cả năm'; ySel.appendChild(oAll);
    for (let y=cy;y>=cy-3;y--) { const o=document.createElement('option'); o.value=y; o.text=y; if(y===cy) o.selected=true; ySel.appendChild(o); }
    
    document.getElementById('mSearch').addEventListener('input', e => {
        const val = e.target.value;
        if (val.trim()) {
            const mSel = document.getElementById('mMonth');
            const ySel = document.getElementById('mYear');
            if (mSel) mSel.value = '';
            if (ySel) ySel.value = '';
        }
        clearTimeout(_m.debounce);
        _m.debounce = setTimeout(() => { 
            _m.search = val; 
            _m.page = 1; 
            _m.orders = []; 
            load(); 
            loadStats();
        }, 400);
    });
    ['mMonth','mYear','mStatus'].forEach(id => document.getElementById(id).addEventListener('change', () => {
        _m.current_step = ''; // Clear pipeline step when manual select changes
        _m.page = 1;
        _m.orders = [];
        load();
        loadStats();
    }));
    load(); loadStats();
}

async function load() {
    const p = new URLSearchParams({page:_m.page,limit:20});
    if (_m.search) p.set('search', _m.search);
    const month = document.getElementById('mMonth').value;
    const year = document.getElementById('mYear').value;
    const status = document.getElementById('mStatus').value;
    if (month) p.set('month', month);
    if (year) p.set('year', year);
    if (status) p.set('status', status);
    if (_m.current_step) p.set('current_step', _m.current_step);
    try {
        const res = await api('/api/trasoat/orders?'+p);
        if (_m.page === 1) _m.orders = res.orders || [];
        else _m.orders = _m.orders.concat(res.orders || []);
        _m.total = res.totalCount || 0;
        render();
    } catch(e) {
        document.getElementById('mResults').innerHTML = '<div class="empty"><div class="icon">❌</div>Lỗi tải dữ liệu</div>';
    }
}

function render() {
    const el = document.getElementById('mResults');
    if (!_m.orders.length) { el.innerHTML = '<div class="empty"><div class="icon">📭</div>Không tìm thấy đơn hàng</div>'; return; }
    const formatExpectedShipDate = (dateVal, priority, standardDeliveryTime) => {
        if (!dateVal) return '-';
        const dt = new Date(dateVal);
        const localDt = new Date(dt.toLocaleString('en-US', { timeZone: 'Asia/Ho_Chi_Minh' }));
        const day = localDt.getDate();
        const month = localDt.getMonth() + 1;

        const daysOfWeek = ['Chủ Nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
        const dayName = daysOfWeek[localDt.getDay()];

        const pri = (priority || 'CHUẨN').toUpperCase();
        if (pri === 'GẤP' || pri === 'GỬI') {
            return `${dayName} - ${day}/${month}`;
        } else {
            let timePart = '';
            if (standardDeliveryTime) {
                timePart = standardDeliveryTime.trim();
            } else {
                const hrs = String(localDt.getHours()).padStart(2, '0');
                const mins = String(localDt.getMinutes()).padStart(2, '0');
                timePart = `${hrs}:${mins}`;
            }
            return `${dayName} - ${timePart} ${day}/${month}`;
        }
    };

    let html = `<div class="results-count">Hiển thị ${_m.orders.length}/${_m.total} đơn</div>`;
    _m.orders.forEach(o => {
        const pColor = o.progress_percent===100?'#10b981':o.progress_percent>=50?'#f59e0b':'#6366f1';
        const priority = (o.shipping_priority || 'CHUẨN').toUpperCase();
        let priClass = 'oc-prio-chuan';
        if (priority === 'GẤP') priClass = 'oc-prio-gap';
        else if (priority === 'GỬI') priClass = 'oc-prio-gui';
        const priBadge = `<span class="oc-prio ${priClass}">${priority}</span>`;

        const badges = (o.is_repair?'<span class="oc-badge oc-badge-repair">SỬA</span>':'')+(o.is_pet_tem?'<span class="oc-badge oc-badge-pet">PET</span>':'') + priBadge;
        const expanded = _m.expandedId === o.id;
        html += `<div class="order-card ${expanded?'expanded':''}" id="mCard${o.id}">
            <div class="oc-top">
                <span class="oc-code" style="display:flex;flex-direction:column;align-items:flex-start">
                    <span>${o.order_code}${badges}</span>
                    ${o.created_by_name ? `<span style="font-size:10px;color:#e65100;font-weight:700;margin-top:2px">👤 Sale: ${o.created_by_name}</span>` : ''}
                </span>
                <span class="oc-status ${o.deviation_class}">${o.deviation_label}</span>
            </div>
            <div class="oc-customer">${o.customer_name||'-'}</div>
            <div class="oc-phone">${o.customer_phone||''}</div>
            <div class="oc-progress">
                <div class="oc-pbar"><div class="oc-pbar-fill" style="width:${o.progress_percent}%;background:${pColor}"></div></div>
                <div class="oc-pinfo"><span style="color:${pColor}">${o.done_steps}/${o.total_steps} (${o.progress_percent}%)</span><span>${o.current_step_name}</span></div>
            </div>
            <div class="oc-date">📅 DK Gửi: ${formatExpectedShipDate(o.expected_ship_date, o.shipping_priority, o.standard_delivery_time)}</div>
            <button class="oc-expand-btn" onclick="toggleDetail(${o.id})">${expanded?'▲ Thu gọn':'▼ Xem chi tiết'}</button>
            ${expanded?'<div class="timeline-detail" id="mDetail'+o.id+'"><div style="text-align:center;padding:16px;color:#9ca3af">⏳</div></div>':''}
        </div>`;
    });
    if (_m.orders.length < _m.total) html += `<button class="load-more" onclick="loadMore()">Tải thêm đơn hàng...</button>`;
    el.innerHTML = html;
    if (_m.expandedId) loadDetail(_m.expandedId);
}

function loadMore() { _m.page++; load(); }

async function toggleDetail(id) {
    _m.expandedId = _m.expandedId===id ? null : id;
    render();
}

async function loadDetail(id) {
    const el = document.getElementById('mDetail'+id); if(!el) return;
    try {
        const res = await api('/api/trasoat/orders/'+id+'/detail');
        const {order:o, items} = res;
        const fmtDT = d => { if(!d) return ''; return new Date(d).toLocaleString('vi-VN',{timeZone:'Asia/Ho_Chi_Minh',hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}); };
        let html = '';
        
        if (!items || !items.length) {
            html += '<div style="text-align:center;padding:12px;color:#9ca3af">Không có sản phẩm nào</div>';
        } else {
            items.forEach((item, itemIdx) => {
                html += `<div style="margin-bottom:16px;padding:12px;border:1px solid #e2e8f0;border-radius:10px;background:#f8fafc">
                    <div style="font-weight:700;font-size:12px;color:#4338ca;margin-bottom:8px;display:flex;justify-content:space-between">
                        <span>🏷️ Phiếu ${itemIdx+1}: ${item.product_name || 'Sản phẩm'} ${item.description ? `(${item.description})` : ''}</span>
                        <span style="background:#e0e7ff;color:#3730a3;padding:1px 6px;border-radius:8px;font-size:10px">SL: ${item.quantity || 0}</span>
                    </div>`;
                
                const timeline = item.timeline || [];
                timeline.forEach((s,i) => {
                    const cls = s.done?'done':(i>0&&timeline[i-1].done&&!s.done)?'active':(i===0&&!s.done)?'active':'pending';
                    const icon = s.done?'✓':cls==='active'?'⏳':''+(i+1);
                    html += `<div class="tl-step">
                        <div class="tl-icon ${cls}" onclick="event.stopPropagation();_tsOpenStepModal(${o.id},'${s.name}',${item.id})" style="cursor:pointer" title="Xem báo cáo ${s.name}">${icon}</div>
                        <div class="tl-info">
                            <div class="tl-name" style="display:flex;align-items:center;flex-wrap:wrap">${s.name}${s.progress ? `<span style="padding:1px 6px;border-radius:4px;font-size:10px;font-weight:800;background:${s.done ? '#d1fae5':'#fef3c7'};color:${s.done ? '#065f46':'#b45309'};margin-left:6px">${s.progress} xong</span>` : ''}</div>
                            ${s.time?'<div class="tl-time">'+fmtDT(s.time)+'</div>':'<div class="tl-time" style="color:#f59e0b">Đang chờ...</div>'}
                            ${s.worker?'<div class="tl-worker">👤 '+s.worker+'</div>':''}
                            ${s.extra ? `<div style="font-size:10px;font-weight:700;color:#7c3aed;margin-top:2px">${s.extra}</div>` : ''}
                        </div>
                    </div>`;
                });
                
                html += `</div>`;
            });
        }
        
        if (o.shipping_status==='shipped') {
            html += '<div class="ship-info">';
            html += `<div class="ship-row"><span>Cskh:</span><b>${o.cskh_name||'-'}</b></div>`;
            html += `<div class="ship-row"><span>🚛 NVC:</span><b>${o.carrier_name||'-'}</b></div>`;
            html += `<div class="ship-row"><span>📦 Mã VĐ:</span><b>${o.tracking_code||'-'}</b></div>`;
            html += `<div class="ship-row"><span>📱 SĐT NX:</span><b>${o.carrier_phone||'-'}</b></div>`;
            html += `<div class="ship-row"><span>📅 Ngày gửi:</span><b>${fmtDT(o.shipped_at)}</b></div>`;
            html += '</div>';
        }
        el.innerHTML = html;
    } catch(e) { console.error(e); el.innerHTML = '<div style="color:#ef4444;padding:12px">❌ Lỗi</div>'; }
}

async function loadStats() {
    const y = document.getElementById('mYear').value || new Date().getFullYear();
    const m = document.getElementById('mMonth').value || '';
    try {
        const s = await api(`/api/trasoat/stats?year=${y}&month=${m}`);
        const activeStep = _m.current_step || '';
        const activeStatus = document.getElementById('mStatus').value || '';

        // Status cards (top row)
        const isAllActive = !activeStep && !activeStatus ? 'active' : '';
        const isEarlyActive = !activeStep && activeStatus === 'early' ? 'active' : '';
        const isOnTimeActive = !activeStep && activeStatus === 'on_time' ? 'active' : '';
        const isLateActive = !activeStep && activeStatus === 'late' ? 'active' : '';

        document.getElementById('mCards').innerHTML = `
            <div class="stat-card ${isAllActive}" style="background:linear-gradient(135deg,#fffbeb,#fde68a);border-color:#fcd34d" onclick="_mSelectStatus('')">
                <div class="num" style="color:#b45309">${s.total}</div>
                <div class="lbl" style="color:#b45309">TỔNG ĐƠN</div>
                <div class="pct" style="color:#b45309">100%</div>
            </div>
            <div class="stat-card ${isEarlyActive}" style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#bbf7d0" onclick="_mSelectStatus('early')">
                <div class="num" style="color:#166534">${s.early}</div>
                <div class="lbl">SỚM HƠN</div>
                <div class="pct" style="color:#16a34a">${s.early_pct}%</div>
            </div>
            <div class="stat-card ${isOnTimeActive}" style="background:linear-gradient(135deg,#eef2ff,#e0e7ff);border-color:#c7d2fe" onclick="_mSelectStatus('on_time')">
                <div class="num" style="color:#3730a3">${s.on_time}</div>
                <div class="lbl">ĐÚNG LỊCH</div>
                <div class="pct" style="color:#4f46e5">${s.on_time_pct}%</div>
            </div>
            <div class="stat-card ${isLateActive}" style="background:linear-gradient(135deg,#fef2f2,#fee2e2);border-color:#fecaca" onclick="_mSelectStatus('late')">
                <div class="num" style="color:#991b1b">${s.late}</div>
                <div class="lbl">TRỄ LỊCH</div>
                <div class="pct" style="color:#dc2626">${s.late_pct}%</div>
            </div>`;

        // Pipeline cards (bottom row)
        const b = s.backlog || { cho_cat: 0, cho_in: 0, cho_ep: 0, dang_may_qc_ht: 0, cho_gui: 0 };
        const isCutActive = activeStep === 'Chờ Cắt' ? 'active' : '';
        const isInActive = activeStep === 'Chờ In' ? 'active' : '';
        const isEpActive = activeStep === 'Chờ Ép' ? 'active' : '';
        const isMayActive = activeStep === 'Đang May / QC / HT' ? 'active' : '';
        const isGuiActive = activeStep === 'Chờ Gửi' ? 'active' : '';

        document.getElementById('mPipelineCards').innerHTML = `
            <div class="stat-card ${isCutActive}" style="background:linear-gradient(135deg,#f1f5f9,#cbd5e1);border-color:#94a3b8" onclick="_mSelectPipelineStep('Chờ Cắt')">
                <div class="num" style="color:#1e293b">${b.cho_cat}</div>
                <div class="lbl" style="color:#334155">CHƯA CẮT</div>
            </div>
            <div class="stat-card ${isInActive}" style="background:linear-gradient(135deg,#ffedd5,#fed7aa);border-color:#f97316" onclick="_mSelectPipelineStep('Chờ In')">
                <div class="num" style="color:#ea580c">${b.cho_in}</div>
                <div class="lbl" style="color:#c2410c">CHƯA IN</div>
            </div>
            <div class="stat-card ${isEpActive}" style="background:linear-gradient(135deg,#faf5ff,#f3e8ff);border-color:#c084fc" onclick="_mSelectPipelineStep('Chờ Ép')">
                <div class="num" style="color:#7e22ce">${b.cho_ep}</div>
                <div class="lbl" style="color:#6b21a8">CHƯA ÉP</div>
            </div>
            <div class="stat-card ${isMayActive}" style="background:linear-gradient(135deg,#f0fdf4,#ccfbf1);border-color:#2dd4bf" onclick="_mSelectPipelineStep('Đang May / QC / HT')">
                <div class="num" style="color:#0f766e">${b.dang_may_qc_ht}</div>
                <div class="lbl" style="color:#0d9488">CHƯA MAY/QC/HT</div>
            </div>
            <div class="stat-card ${isGuiActive}" style="background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-color:#38bdf8" onclick="_mSelectPipelineStep('Chờ Gửi')">
                <div class="num" style="color:#0369a1">${b.cho_gui}</div>
                <div class="lbl" style="color:#0284c7">CHƯA GỬI</div>
            </div>`;
    } catch(e) {}
}

function _mSelectStatus(statusValue) {
    document.getElementById('mStatus').value = statusValue;
    _m.current_step = ''; // Clear pipeline filter when status filter is selected
    _m.page = 1;
    _m.orders = [];
    load();
    loadStats();
}

function _mSelectPipelineStep(stepName) {
    _m.current_step = stepName;
    document.getElementById('mMonth').value = '';
    document.getElementById('mYear').value = '';
    document.getElementById('mStatus').value = '';
    _m.page = 1;
    _m.orders = [];
    load();
    loadStats();
}

let html5QrcodeScanner = null;

function mScanQR() {
    if (window.location.protocol === 'http:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        alert("Để sử dụng camera quét mã QR, vui lòng truy cập địa chỉ có bảo mật (https):\nhttps://" + window.location.host + window.location.pathname + window.location.search);
        return;
    }
    let overlay = document.getElementById('qrScannerOverlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'qrScannerOverlay';
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,0.85);backdrop-filter:blur(8px);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';
        overlay.innerHTML = `
            <div style="width:100%;max-width:400px;background:#1f2937;border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:24px;box-shadow:0 20px 40px rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;gap:20px;color:white;font-family:system-ui,sans-serif;">
                <div style="width:100%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:12px;">
                    <h3 style="font-size:16px;font-weight:800;color:#f97316;margin:0;">📷 QUÉT MÃ QR ĐƠN HÀNG</h3>
                    <button onclick="stopQRScan()" style="background:none;border:none;color:#9ca3af;font-size:20px;cursor:pointer;line-height:1;">&times;</button>
                </div>
                <div id="qrReader" style="width:100%;aspect-ratio:1;background:#111827;border-radius:16px;overflow:hidden;border:2px dashed rgba(249,115,22,0.3);position:relative;">
                </div>
                <div style="font-size:12px;color:#9ca3af;text-align:center;line-height:1.5;">
                    Di chuyển camera đến gần mã QR của đơn hàng để quét tự động.
                </div>
                <button onclick="stopQRScan()" style="width:100%;padding:12px;background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.2);border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;">
                    HỦY BỎ
                </button>
            </div>
        `;
        document.body.appendChild(overlay);
    } else {
        overlay.style.display = 'flex';
    }

    html5QrcodeScanner = new Html5Qrcode("qrReader");
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };

    html5QrcodeScanner.start(
        { facingMode: "environment" },
        config,
        onScanSuccess,
        onScanFailure
    ).catch(err => {
        console.error("Camera access error:", err);
        html5QrcodeScanner.start(
            { facingMode: "user" },
            config,
            onScanSuccess,
            onScanFailure
        ).catch(err2 => {
            alert("❌ Không thể truy cập camera. Vui lòng cấp quyền camera!");
            stopQRScan();
        });
    });
}

function onScanSuccess(decodedText) {
    const searchInp = document.getElementById('mSearch');
    if (searchInp) {
        const text = decodedText.trim();
        searchInp.value = text;
        const mSel = document.getElementById('mMonth');
        const ySel = document.getElementById('mYear');
        if (mSel) mSel.value = '';
        if (ySel) ySel.value = '';
        
        _m.search = text; 
        _m.page = 1; 
        _m.orders = []; 
        load(); 
        loadStats();
    }
    stopQRScan();
}

function onScanFailure(error) {
}

function stopQRScan() {
    const overlay = document.getElementById('qrScannerOverlay');
    if (overlay) {
        overlay.style.display = 'none';
    }
    if (html5QrcodeScanner) {
        html5QrcodeScanner.stop().then(() => {
            html5QrcodeScanner.clear();
            html5QrcodeScanner = null;
        }).catch(err => {
            console.error("Failed to stop scanner:", err);
            html5QrcodeScanner = null;
        });
    }
}

document.addEventListener('DOMContentLoaded', init);
window.apiCall = api;
window.currentUser = null;
</script>
