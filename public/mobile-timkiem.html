<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔍 Tìm Kiếm KH — Đồng Phục HV</title>
    <meta name="description" content="Tìm kiếm khách hàng nhanh trên điện thoại">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="/images/logo.png" type="image/png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f1f5f9;
            min-height: 100vh; color: #1e293b;
        }

        /* Header */
        .m-header {
            background: linear-gradient(135deg, #122546, #1e3a5f);
            padding: 14px 16px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            position: sticky; top: 0; z-index: 100;
        }
        .m-header img { width: 32px; height: 32px; border-radius: 8px; }
        .m-header h1 { font-size: 15px; font-weight: 800; color: #fbbf24; flex: 1; }
        .m-header .m-user {
            font-size: 10px; color: #93c5fd; font-weight: 600;
            background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px;
        }

        /* Toast */
        .m-toast-container { position: fixed; top: 60px; left: 8px; right: 8px; z-index: 999; }
        .m-toast {
            padding: 12px 16px; border-radius: 10px; color: white; font-size: 14px; font-weight: 600;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25); animation: mSlideIn .3s ease; margin-bottom: 6px;
        }
        .m-toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .m-toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .m-toast-info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        @keyframes mSlideIn { from { opacity:0; transform:translateY(-15px); } to { opacity:1; transform:translateY(0); } }

        /* Content */
        .m-content { padding: 14px; max-width: 600px; margin: 0 auto; }

        /* Search bar */
        .m-search-box {
            display: flex; gap: 8px; margin-bottom: 16px;
            position: sticky; top: 60px; z-index: 50;
            background: #f1f5f9; padding: 8px 0;
        }
        .m-search-input {
            flex: 1; padding: 14px 16px; border: 2px solid #e2e8f0;
            border-radius: 14px; font-size: 16px; font-family: 'Inter', sans-serif;
            background: white; color: #1e293b; outline: none; transition: border .2s;
            -webkit-appearance: none;
        }
        .m-search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
        .m-search-input::placeholder { color: #94a3b8; }
        .m-search-btn {
            padding: 14px 20px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white;
            font-size: 16px; font-weight: 800; cursor: pointer; flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(37,99,235,0.3);
        }
        .m-search-btn:active { transform: scale(0.96); }

        /* Stats row */
        .m-stats { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .m-stat {
            border-radius: 12px; padding: 12px 8px; text-align: center;
            border: 2px solid transparent;
        }
        .m-stat-num { font-size: 24px; font-weight: 900; }
        .m-stat-label { font-size: 10px; font-weight: 700; margin-top: 2px; }

        /* Section */
        .m-section { margin-bottom: 18px; }
        .m-section-header {
            font-size: 14px; font-weight: 800; margin-bottom: 8px;
            display: flex; align-items: center; gap: 8px;
        }
        .m-section-badge {
            padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 700;
        }

        /* Result card */
        .m-result {
            background: white; border-radius: 14px; padding: 14px 16px;
            margin-bottom: 10px; border: 1.5px solid #e2e8f0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            transition: all .15s; cursor: pointer;
        }
        .m-result:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .m-result-top {
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
        }
        .m-result-icon {
            width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 16px; flex-shrink: 0;
        }
        .m-result-name { font-size: 15px; font-weight: 800; color: #0f172a; }
        .m-result-phone { font-size: 12px; color: #64748b; }
        .m-result-tags {
            display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
        }
        .m-tag {
            font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600;
        }
        .m-result-meta {
            font-size: 11px; color: #94a3b8; margin-top: 6px;
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .m-result-arrow {
            float: right; background: #f8fafc; border: 1px solid #e2e8f0;
            border-radius: 8px; padding: 4px 10px; font-size: 10px;
            font-weight: 700; color: #64748b; margin-top: -36px;
        }

        /* Empty */
        .m-empty { text-align: center; padding: 50px 20px; color: #94a3b8; }
        .m-empty-icon { font-size: 48px; margin-bottom: 10px; opacity: 0.4; }
        .m-empty-text { font-size: 15px; font-weight: 600; }
        .m-empty-hint { font-size: 12px; margin-top: 4px; color: #cbd5e1; }

        /* Loading */
        .m-loading { text-align: center; padding: 50px 20px; }
        .m-spinner {
            width: 28px; height: 28px; border: 3px solid #e2e8f0;
            border-top-color: #3b82f6; border-radius: 50%;
            animation: spin .6s linear infinite; display: inline-block; margin-bottom: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Link */
        .m-back {
            display: inline-flex; align-items: center; gap: 6px;
            color: #3b82f6; font-size: 13px; font-weight: 600;
            text-decoration: none; margin-top: 10px; padding: 10px 16px;
            background: white; border-radius: 10px; border: 1px solid #e2e8f0;
        }

        /* Highlight */
        mark { background: #fef08a; padding: 1px 2px; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="m-header">
        <img src="/images/logo.png" alt="Logo">
        <h1>🔍 TÌM KIẾM KH</h1>
        <span class="m-user" id="mUserBadge">...</span>
    </div>

    <div class="m-toast-container" id="mToastContainer"></div>

    <div class="m-content">
        <div class="m-search-box" id="mSearchBox">
            <input type="search" id="mSearchInput" class="m-search-input"
                placeholder="Tên, SĐT, link, mã đơn..."
                inputmode="search" enterkeyhint="search">
            <button id="mSearchBtn" class="m-search-btn" onclick="_mSearch()">🔍</button>
        </div>
        <div id="mResults">
            <div class="m-empty">
                <div class="m-empty-icon">🔍</div>
                <div class="m-empty-text">Nhập từ khóa để tìm kiếm</div>
                <div class="m-empty-hint">Hỗ trợ: Tên KH, SĐT, mã đơn, link MXH</div>
            </div>
        </div>
        <a href="/timkiemkhachhanghv" class="m-back">← Về trang Desktop</a>
    </div>

    <script>
    let currentUser = null;

    async function apiCall(url, method = 'GET', body = null) {
        const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(url, opts);
        if (res.status === 401) { window.location.href = '/index.html'; return; }
        return res.json();
    }

    function mToast(msg, type = 'success') {
        const c = document.getElementById('mToastContainer');
        const d = document.createElement('div');
        d.className = 'm-toast m-toast-' + type;
        d.textContent = msg;
        c.appendChild(d);
        setTimeout(() => d.remove(), 3000);
    }

    // Init
    (async () => {
        try {
            const auth = await apiCall('/api/auth/me');
            if (!auth.user) { window.location.href = '/index.html'; return; }
            currentUser = auth.user;
            document.getElementById('mUserBadge').textContent = currentUser.full_name || currentUser.username;
        } catch(e) {
            document.getElementById('mResults').innerHTML = '<div class="m-empty">❌ Lỗi kết nối</div>';
        }
    })();

    // Search on Enter
    document.getElementById('mSearchInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); _mSearch(); }
    });

    async function _mSearch() {
        const input = document.getElementById('mSearchInput');
        const el = document.getElementById('mResults');
        const q = (input.value || '').trim();
        if (!q || q.length < 2) { mToast('Nhập ít nhất 2 ký tự', 'error'); return; }

        el.innerHTML = '<div class="m-loading"><div class="m-spinner"></div><div style="color:#64748b;font-weight:600;">Đang tìm...</div></div>';
        // Blur input to dismiss mobile keyboard
        input.blur();

        try {
            const data = await apiCall('/api/search/customers?q=' + encodeURIComponent(q));
            _mRender(data, q);
        } catch(e) {
            el.innerHTML = '<div class="m-empty">❌ Lỗi: ' + (e.message || '') + '</div>';
        }
    }

    function _mHighlight(text, query) {
        if (!text || !query) return text || '';
        const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return String(text).replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
    }

    function _mFmtDate(d) {
        if (!d) return '—';
        const p = (d || '').slice(0, 10).split('-');
        return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : d;
    }

    function _mRender(data, q) {
        const el = document.getElementById('mResults');
        const crm = data.crm || [], telesale = data.telesale || [], orders = data.orders || [], addcmt = data.addcmt || [];
        const total = crm.length + telesale.length + orders.length + addcmt.length;

        if (total === 0) {
            el.innerHTML = `<div class="m-empty">
                <div class="m-empty-icon">😕</div>
                <div class="m-empty-text">Không tìm thấy "${q}"</div>
                <div class="m-empty-hint">Thử SĐT, tên KH hoặc mã đơn</div>
            </div>`;
            return;
        }

        const CRM_LABELS = { nhu_cau:'KH Nhu Cầu', ctv_hoa_hong:'Affiliate', ctv:'CTV', koc_tiktok:'KOL/KOC' };
        let h = '';

        // Stats
        h += '<div class="m-stats">';
        h += `<div class="m-stat" style="background:#eff6ff;border-color:#93c5fd;"><div class="m-stat-num" style="color:#1d4ed8;">${total}</div><div class="m-stat-label" style="color:#1e40af;">Tổng</div></div>`;
        h += `<div class="m-stat" style="background:#f0fdf4;border-color:#86efac;"><div class="m-stat-num" style="color:#166534;">${crm.length}</div><div class="m-stat-label" style="color:#15803d;">CRM</div></div>`;
        h += `<div class="m-stat" style="background:#fef2f2;border-color:#fca5a5;"><div class="m-stat-num" style="color:#dc2626;">${telesale.length}</div><div class="m-stat-label" style="color:#991b1b;">Telesale</div></div>`;
        h += `<div class="m-stat" style="background:#f5f3ff;border-color:#c4b5fd;"><div class="m-stat-num" style="color:#7c3aed;">${orders.length}</div><div class="m-stat-label" style="color:#6d28d9;">Đơn hàng</div></div>`;
        h += '</div>';

        // CRM
        if (crm.length > 0) {
            h += `<div class="m-section">
                <div class="m-section-header" style="color:#166534;">
                    <span style="background:#dcfce7;padding:3px 7px;border-radius:7px;">🏷️</span> CRM
                    <span class="m-section-badge" style="background:#dcfce7;color:#166534;">${crm.length}</span>
                </div>`;
            crm.forEach(c => {
                const lbl = CRM_LABELS[c.crm_type] || c.crm_type || '';
                h += `<div class="m-result" style="border-color:#bbf7d0;" onclick="mToast('Mở CRM trên Desktop để xem chi tiết','info')">
                    <div class="m-result-top">
                        <div class="m-result-icon" style="background:linear-gradient(135deg,#16a34a,#15803d);">👤</div>
                        <div>
                            <div class="m-result-name">${_mHighlight(c.customer_name || '—', q)}</div>
                            <div class="m-result-phone">📞 ${_mHighlight(c.phone || '—', q)}${c.phone2 ? ' · 📱 ' + _mHighlight(c.phone2, q) : ''}</div>
                        </div>
                    </div>
                    <div class="m-result-tags">
                        <span class="m-tag" style="background:#dbeafe;color:#1d4ed8;">${lbl}</span>
                        ${c.order_status ? '<span class="m-tag" style="background:#fef3c7;color:#92400e;">' + c.order_status + '</span>' : ''}
                        <span class="m-tag" style="background:#f0fdf4;color:#166534;">👤 ${c.assigned_to_name || c.created_by_name || '—'}</span>
                    </div>
                    <div class="m-result-meta">
                        <span>📅 ${_mFmtDate(c.created_at)}</span>
                        ${c.consult_count > 0 ? '<span>💬 ' + c.consult_count + ' tư vấn</span>' : ''}
                        ${c.order_count > 0 ? '<span>📦 ' + c.order_count + ' đơn</span>' : ''}
                    </div>
                </div>`;
            });
            h += '</div>';
        }

        // Telesale
        if (telesale.length > 0) {
            h += `<div class="m-section">
                <div class="m-section-header" style="color:#dc2626;">
                    <span style="background:#fecaca;padding:3px 7px;border-radius:7px;">📞</span> Telesale
                    <span class="m-section-badge" style="background:#fecaca;color:#991b1b;">${telesale.length}</span>
                </div>`;
            telesale.forEach(t => {
                h += `<div class="m-result" style="border-color:#fecaca;" onclick="mToast('Mở Gọi Điện trên Desktop để xem chi tiết','info')">
                    <div class="m-result-top">
                        <div class="m-result-icon" style="background:linear-gradient(135deg,#ef4444,#dc2626);">📞</div>
                        <div>
                            <div class="m-result-name">${_mHighlight(t.customer_name || t.company_name || '—', q)}</div>
                            <div class="m-result-phone">📞 ${_mHighlight(t.phone || '—', q)}</div>
                        </div>
                    </div>
                    <div class="m-result-tags">
                        <span class="m-tag" style="background:#fef2f2;color:#dc2626;">Telesale</span>
                        <span class="m-tag" style="background:#f8fafc;color:#64748b;">${t.status || '—'}</span>
                        ${t.assigned_to_name ? '<span class="m-tag" style="background:#f0fdf4;color:#166534;">👤 ' + t.assigned_to_name + '</span>' : ''}
                    </div>
                    <div class="m-result-meta">
                        <span>📅 ${_mFmtDate(t.created_at)}</span>
                        ${t.address ? '<span>📍 ' + t.address + '</span>' : ''}
                    </div>
                </div>`;
            });
            h += '</div>';
        }

        // Orders
        if (orders.length > 0) {
            h += `<div class="m-section">
                <div class="m-section-header" style="color:#7c3aed;">
                    <span style="background:#ede9fe;padding:3px 7px;border-radius:7px;">📦</span> Đơn hàng
                    <span class="m-section-badge" style="background:#ede9fe;color:#6d28d9;">${orders.length}</span>
                </div>`;
            orders.forEach(o => {
                h += `<div class="m-result" style="border-color:#c4b5fd;" onclick="mToast('Mở CRM trên Desktop để xem chi tiết','info')">
                    <div class="m-result-top">
                        <div class="m-result-icon" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed);">📦</div>
                        <div>
                            <div class="m-result-name">Mã: ${_mHighlight(o.order_code, q)}</div>
                            <div class="m-result-phone">👤 ${_mHighlight(o.customer_name || '—', q)} · 📞 ${_mHighlight(o.phone || '—', q)}</div>
                        </div>
                    </div>
                    <div class="m-result-tags">
                        <span class="m-tag" style="background:#f5f3ff;color:#7c3aed;">${o.status || '—'}</span>
                        ${o.deposit_amount > 0 ? '<span class="m-tag" style="background:#fef3c7;color:#92400e;">💰 ' + Number(o.deposit_amount).toLocaleString() + 'đ</span>' : ''}
                        <span class="m-tag" style="background:#f0fdf4;color:#166534;">👤 ${o.user_name || '—'}</span>
                    </div>
                    <div class="m-result-meta"><span>📅 ${_mFmtDate(o.created_at)}</span></div>
                </div>`;
            });
            h += '</div>';
        }

        // Add/Cmt
        if (addcmt.length > 0) {
            h += `<div class="m-section">
                <div class="m-section-header" style="color:#0891b2;">
                    <span style="background:#cffafe;padding:3px 7px;border-radius:7px;">👥</span> Add/Cmt
                    <span class="m-section-badge" style="background:#cffafe;color:#0e7490;">${addcmt.length}</span>
                </div>`;
            addcmt.forEach(a => {
                h += `<div class="m-result" style="border-color:#a5f3fc;" onclick="mToast('Mở Add/Cmt trên Desktop để xem chi tiết','info')">
                    <div class="m-result-top">
                        <div class="m-result-icon" style="background:linear-gradient(135deg,#06b6d4,#0891b2);">👥</div>
                        <div>
                            <div class="m-result-name" style="font-size:13px;">🔗 ${_mHighlight((a.fb_link || '—').substring(0, 40), q)}</div>
                            <div class="m-result-phone">👤 ${a.user_name || '—'} · 📅 ${_mFmtDate(a.entry_date)}</div>
                        </div>
                    </div>
                </div>`;
            });
            h += '</div>';
        }

        el.innerHTML = h;
    }
    </script>
</body>
</html>
