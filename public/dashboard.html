<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồng Phục HV - Quản Trị</title>
    <meta name="description" content="Hệ thống quản trị khách hàng Đồng Phục HV">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=20260605a">
    <link rel="stylesheet" href="/css/style-mobile.css?v=20260429b" media="(max-width: 768px)">
    <link rel="stylesheet" href="/css/telesale.css?v=20260405">
    <link rel="stylesheet" href="/css/quytac-tuvan.css?v=20260413">
    <link rel="icon" href="/images/logo.png" type="image/png">
</head>
<body class="dashboard">
    <!-- ★ Auth loading overlay: hides stale cached content until checkAuth() completes -->
    <div id="authLoadingOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
        <img src="/images/logo.png" alt="Logo" style="width:60px;height:60px;border-radius:12px;animation:_authPulse 1.5s infinite;">
        <div style="color:rgba(255,255,255,.6);font-size:13px;font-weight:600;font-family:Inter,sans-serif;">Đang xác thực...</div>
        <style>@keyframes _authPulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }</style>
    </div>
    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container">
        <!-- Mobile overlay (must be inside app-container, same stacking context as sidebar) -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="_sidebarOpen=false;document.getElementById('sidebar').style.cssText='';this.style.cssText='';"></div>
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/images/logo.png" alt="Logo">
                <div class="brand">
                    <h2>ĐỒNG PHỤC HV</h2>
                    <p>Quản trị hệ thống</p>
                </div>
                <button class="sidebar-toggle-btn" id="sidebarToggleBtn" onclick="toggleSidebar()" title="Đóng/Mở menu">◀</button>
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Dynamic menu items rendered by JS -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar"></div>
                    <div class="user-details">
                        <div class="name" id="userName"></div>
                        <span class="role-badge" id="userRole"></span>
                    </div>
                    <button class="btn-logout" id="logoutBtn" title="Đăng xuất">⏻</button>
                </div>
            </div>
        </aside>



        <!-- Main Content -->
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
                    <h1 class="page-title" id="pageTitle">Dashboard</h1>
                </div>
                <div class="topbar-right">
                    <!-- Commitment button (shimmer) -->
                    <div style="position:relative;display:inline-block" id="commitBtnWrap">
                        <button id="commitBtn" onclick="_commitToggle()" style="position:relative;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border:none;padding:6px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(124,58,237,0.3);transition:all .15s;overflow:hidden;" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='none'">
                            <span style="position:relative;z-index:1">📋 CAM KẾT</span>
                            <span id="commitShimmer" style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);animation:_commitShimmer 2.5s infinite;z-index:0"></span>
                            <span id="commitBadge" style="display:none;position:absolute;top:-6px;right:-6px;background:#fbbf24;color:#7c2d12;font-size:10px;font-weight:900;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;line-height:1.4;box-shadow:0 2px 6px rgba(251,191,36,0.5);z-index:2"></span>
                        </button>
                        <div id="commitDropdown" style="display:none;position:absolute;right:0;top:calc(100% + 8px);width:380px;max-height:500px;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.18);z-index:9999;overflow:hidden">
                            <div id="commitDropdownContent" style="padding:16px">
                                <div style="text-align:center;color:#9ca3af;padding:20px">⏳ Đang tải...</div>
                            </div>
                        </div>
                    </div>
                    <style>
                        @keyframes _commitShimmer { 0%{left:-100%} 100%{left:100%} }
                    </style>
                    <button class="btn btn-sm" id="notifBtn" onclick="_notifToggle()" style="position:relative;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;border:none;padding:6px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(217,119,6,0.3);transition:all .15s;" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='none'">🔔 THÔNG BÁO <span id="notifBadge" style="display:none;position:absolute;top:-6px;right:-6px;background:#dc2626;color:white;font-size:10px;font-weight:900;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;line-height:1.4;box-shadow:0 2px 6px rgba(220,38,38,0.4);animation:_notifPulse 2s infinite;"></span></button>
                    <!-- Time Override (chỉ GĐ) -->
                    <div id="timeOverrideWrap" style="position:relative;display:none;">
                        <button id="timeOverrideBtn" onclick="_toToggle(event)" style="position:relative;background:linear-gradient(135deg,#059669,#10b981);color:white;border:none;padding:6px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(5,150,105,0.3);transition:all .15s;" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='none'">⏰ GIỜ HỆ THỐNG<span id="toBadge" style="display:none;position:absolute;top:-6px;right:-6px;background:#dc2626;color:white;font-size:9px;font-weight:900;padding:2px 5px;border-radius:8px;animation:_notifPulse 2s infinite;">⚡</span></button>
                        <div id="toDropdown" style="display:none;position:absolute;right:0;top:calc(100% + 8px);width:340px;background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,0.2);z-index:9999;overflow:hidden;">
                            <div style="background:linear-gradient(135deg,#059669,#10b981);padding:14px 18px;color:white;">
                                <div style="font-size:14px;font-weight:800;">⏰ Thời Gian Hệ Thống</div>
                                <div style="font-size:11px;opacity:0.8;margin-top:2px;">Chỉnh giờ để test deadline checker</div>
                            </div>
                            <div style="padding:16px 18px;">
                                <div id="toCurrentTime" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 14px;margin-bottom:12px;text-align:center;">
                                    <div style="font-size:11px;color:#16a34a;font-weight:600;">Giờ hiện tại</div>
                                    <div id="toCurrentLabel" style="font-size:18px;font-weight:800;color:#15803d;">---</div>
                                </div>
                                <div style="display:flex;gap:8px;margin-bottom:12px;">
                                    <input type="date" id="toDate" style="flex:1;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;font-weight:600;">
                                    <input type="time" id="toTime" style="width:110px;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;font-weight:600;">
                                </div>
                                <div style="display:flex;gap:8px;margin-bottom:10px;">
                                    <button onclick="_toApply()" style="flex:1;padding:8px;background:linear-gradient(135deg,#059669,#10b981);color:white;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;">⚡ Áp Dụng</button>
                                    <button onclick="_toReset()" style="flex:1;padding:8px;background:#f3f4f6;color:#374151;border:1px solid #d1d5db;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;">🔄 Mặc Định</button>
                                </div>
                                <button onclick="_toTrigger()" style="width:100%;padding:8px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;">🚀 Chạy Deadline Check Ngay</button>
                                <div id="toStatus" style="font-size:11px;color:#6b7280;text-align:center;margin-top:8px;"></div>
                            </div>
                        </div>
                    </div>
                    <!-- Daily Report (chỉ GĐ) -->
                    <div id="dailyReportWrap" style="position:relative;display:none;">
                        <button id="dailyReportBtn" onclick="_drToggle(event)" style="position:relative;background:linear-gradient(135deg,#0891b2,#06b6d4);color:white;border:none;padding:6px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(8,145,178,0.3);transition:all .15s;" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='none'">📊 TỔNG KẾT</button>
                        <div id="drDropdown" style="display:none;position:absolute;right:0;top:calc(100% + 8px);width:420px;background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,0.2);z-index:9999;overflow:hidden;">
                            <div style="background:linear-gradient(135deg,#0891b2,#06b6d4);padding:14px 18px;color:white;">
                                <div style="font-size:14px;font-weight:800;">📊 Tổng Kết Hàng Ngày</div>
                                <div style="font-size:11px;opacity:0.8;margin-top:2px;">Gộp báo cáo tự động gửi Telegram</div>
                            </div>
                            <div id="drContent" style="padding:16px 18px;max-height:450px;overflow-y:auto;">
                                <div style="text-align:center;color:#9ca3af;padding:20px">⏳ Đang tải...</div>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-sm btn-secondary" id="changePasswordBtn">🔒 Đổi mật khẩu</button>
                </div>
            </div>

            <div class="content-area" id="contentArea">
                <!-- Dynamic content rendered by JS -->
            </div>
        </main>
    </div>

    <!-- Modal container -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContainer">
            <div class="modal-header">
                <h3 id="modalTitle">Modal</h3>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>
