<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồng Phục HV - Quản Trị</title>
    <meta name="description" content="Hệ thống quản trị khách hàng Đồng Phục HV">
    <link rel="stylesheet" href="/css/style.css?v=20260323c">
    <link rel="icon" href="/images/logo.png" type="image/png">
</head>
<body class="dashboard">
    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/images/logo.png" alt="Logo">
                <div class="brand">
                    <h2>ĐỒNG PHỤC HV</h2>
                    <p>Quản trị hệ thống</p>
                </div>
                <button class="sidebar-toggle-btn" id="sidebarToggleBtn" onclick="toggleSidebar()" title="Đóng/Mở menu">◀</button>
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Dynamic menu items rendered by JS -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="name" id="userName">Admin</div>
                        <span class="role-badge" id="userRole">Giám Đốc</span>
                    </div>
                    <button class="btn-logout" id="logoutBtn" title="Đăng xuất">⏻</button>
                </div>
            </div>
        </aside>



        <!-- Main Content -->
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
                    <h1 class="page-title" id="pageTitle">Dashboard</h1>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-sm btn-secondary" id="changePasswordBtn">🔒 Đổi mật khẩu</button>
                </div>
            </div>

            <div class="content-area" id="contentArea">
                <!-- Dynamic content rendered by JS -->
            </div>
        </main>
    </div>

    <!-- Modal container -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContainer">
            <div class="modal-header">
                <h3 id="modalTitle">Modal</h3>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <script src="/js/app.js?v=20260323d"></script>
    <script src="/js/pages/accounts.js"></script>
    <script src="/js/pages/teams.js"></script>
    <script src="/js/pages/permissions.js"></script>
    <script src="/js/pages/settings.js"></script>
    <script src="/js/pages/chuyenso.js"></script>
    <script src="/js/pages/crm.js"></script>
    <script src="/js/pages/crm-nhucau.js"></script>
    <script src="/js/pages/emergency.js"></script>
    <script src="/js/pages/hoahong.js"></script>
    <script src="/js/pages/quanlyaffiliate.js"></script>
    <script src="/js/pages/taikhoanaffiliate.js"></script>
    <script src="/js/pages/baocaohoahong.js"></script>
    <script src="/js/pages/rut-tien-affiliate.js"></script>
    <script src="/js/pages/bangxephangaffiliate.js"></script>
    <script src="/js/pages/giaithuonggame.js"></script>
    <script src="/js/pages/traogiaithuong.js"></script>
    <script src="/js/prize-popup.js"></script>
    <script src="/js/pages/bxh-template.js"></script>
    <script src="/js/pages/bangxephangkinhdoanh.js"></script>
    <script src="/js/pages/bangxephangsale.js"></script>
    <script src="/js/pages/bangxephangctv.js"></script>
    <script src="/js/pages/bxhsanxuat.js"></script>
    <script src="/js/pages/bxhvanphong.js"></script>
    <script src="/js/pages/bangiao-diem.js?v=20260329d"></script>
    <script src="/js/pages/lich-khoabieu.js"></script>
    <script src="/js/pages/lichsu-baocao.js"></script>
    <script src="/js/pages/khoatknv.js"></script>
    <script src="/js/pages/xinnghi.js"></script>
    <script src="/js/pages/setupngayle.js"></script>
</body>
</html>
